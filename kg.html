<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>DigiKids — KG Explorers — Global Language Master</title>
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@600;700;800&family=Nunito:wght@700;800&display=swap" rel="stylesheet"/>
<style>
:root{
  --violet:#7C4DFF; --violet-dark:#5E35B1;
  --orange:#EF6C00; --orange-dark:#B54700;
  --blue:#039BE5; --blue-dark:#01579B;
  --green:#43A047; --green-dark:#2E7031;
  --pink:#EC407A; --pink-dark:#B4275A;
  --gold:#F9A825; --gold-dark:#C17900;
  --cream:#FFF9EF; --ink:#27323A; --sub:#5F7078;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:"Nunito",sans-serif;background:var(--cream);min-height:100vh;color:var(--ink);}
.topbar{background:var(--violet);color:#fff;display:flex;align-items:center;gap:12px;
  padding:12px 18px;box-shadow:0 4px 18px rgba(124,77,255,0.35);}
.topbar .appu{font-size:2.2rem;}
.topbar h1{font-family:"Baloo 2",cursive;font-size:1.25rem;font-weight:800;line-height:1.1;}
.topbar small{display:block;font-size:0.72rem;font-weight:700;opacity:0.85;}
.top-right{margin-left:auto;display:flex;align-items:center;gap:10px;}
.pill{background:rgba(255,255,255,0.16);border:1px solid rgba(255,255,255,0.3);
  border-radius:999px;padding:6px 14px;font-weight:800;font-size:0.9rem;}
.home-link{color:#fff;text-decoration:none;font-weight:800;font-size:0.85rem;
  border-bottom:2px dashed rgba(255,255,255,0.5);}
.wrap{max-width:860px;margin:0 auto;padding:26px 18px 60px;}
.hello{background:#fff;border-radius:22px;padding:18px 22px;display:flex;align-items:center;gap:16px;
  box-shadow:0 8px 0 #EADFC8;margin-bottom:26px;}
.hello .face{font-size:3.2rem;}
.hello .msg{font-family:"Baloo 2",cursive;font-weight:800;font-size:1.15rem;color:var(--violet);}
.hello .sub{font-size:0.85rem;font-weight:700;color:var(--sub);}
.islands{display:grid;grid-template-columns:repeat(auto-fit,minmax(230px,1fr));gap:20px;}
.island{background:#fff;border:none;border-radius:26px;padding:24px 18px;text-align:center;cursor:pointer;
  transition:transform 0.12s;font-family:"Nunito",sans-serif;}
.island:hover{transform:translateY(-5px);}
.island .big{font-size:3.4rem;}
.island h2{font-family:"Baloo 2",cursive;font-weight:800;font-size:1.25rem;margin:8px 0 4px;}
.island p{font-size:0.85rem;font-weight:700;color:var(--sub);}
.island .go{display:inline-block;margin-top:12px;color:#fff;border-radius:999px;
  padding:9px 22px;font-family:"Baloo 2",cursive;font-weight:800;font-size:0.95rem;}
.eng{box-shadow:0 10px 0 var(--orange-dark);}
.eng h2{color:var(--orange);}
.eng .go{background:var(--orange);box-shadow:0 4px 0 var(--orange-dark);}
.mat{box-shadow:0 10px 0 var(--blue-dark);}
.mat h2{color:var(--blue);}
.mat .go{background:var(--blue);box-shadow:0 4px 0 var(--blue-dark);}
.skg{box-shadow:0 10px 0 var(--green-dark);}
.skg h2{color:var(--green);}
.skg .go{background:var(--green);box-shadow:0 4px 0 var(--green-dark);}
.soon{box-shadow:0 10px 0 #C9D2D6;opacity:0.75;cursor:default;}
.soon:hover{transform:none;}
.soon h2{color:#8B979D;}
.soon .go{background:#B9C3C8;box-shadow:0 4px 0 #98A4AA;cursor:default;}
</style>
</head>
<body>
<div class="topbar">
  <span class="appu">🐘</span>
  <h1>DigiKids — KG Explorers<small id="tb-school">Global Language Master</small></h1>
  <div class="top-right">
    <div class="pill">⭐ <span id="kg-stars">0</span></div>
    <a class="home-link" href="home.html">🏠 Home</a>
  </div>
</div>

<div class="wrap">
  <div class="hello">
    <span class="face">🐘</span>
    <div>
      <div class="msg">Hi! I am Appu the elephant! <span id="hello-name"></span></div>
      <div class="sub">Which island shall we explore today? Tap one and let's play and learn!</div>
    </div>
  </div>

  <div class="islands">
    <button class="island skg" onclick="location.href='kg-ukg-english.html'">
      <div class="big">🎒</div>
      <h2>Senior KG — English</h2>
      <p>Position words, opposites, this &amp; that — full UKG lessons!</p>
      <span class="go">Let's Go! ➜</span>
    </button>
    <button class="island eng" onclick="location.href='kg-english.html'">
      <div class="big">🔤</div>
      <h2>English Island</h2>
      <p>Big letters, small letters &amp; letter games</p>
      <span class="go">Let's Go! ➜</span>
    </button>
    <button class="island mat" onclick="location.href='kg-maths.html'">
      <div class="big">🔢</div>
      <h2>Maths Island</h2>
      <p>Numbers, counting fun, shapes &amp; colours</p>
      <span class="go">Let's Go! ➜</span>
    </button>
    <button class="island soon">
      <div class="big">🌍</div>
      <h2>EVS Island</h2>
      <p>My body, animals, family &amp; more</p>
      <span class="go">Coming soon!</span>
    </button>
    <button class="island soon">
      <div class="big">🎵</div>
      <h2>Rhymes Island</h2>
      <p>English &amp; Tamil rhymes — sing along!</p>
      <span class="go">Coming soon!</span>
    </button>
    <button class="island soon">
      <div class="big">📚</div>
      <h2>Story Island</h2>
      <p>Wonderful stories with Appu</p>
      <span class="go">Coming soon!</span>
    </button>
  </div>
</div>

<script>
'use strict';
var SCHOOL=null;
try{ SCHOOL=JSON.parse(localStorage.getItem('glm_school')||'null'); }catch(e){}
if(!SCHOOL || !SCHOOL.code){ location.href='index.html'; }
else if(!SCHOOL.has_kg){ location.href='home.html'; }
if(SCHOOL && SCHOOL.name){ document.getElementById('tb-school').textContent=SCHOOL.name; }

function starsOf(key){
  try{
    var p=JSON.parse(localStorage.getItem(key)||'{}'),t=0,k;
    for(k in p){ if(p[k]&&p[k].stars) t+=p[k].stars; }
    return t;
  }catch(e){ return 0; }
}
document.getElementById('kg-stars').textContent = starsOf('kge_progress')+starsOf('kgm_progress')+starsOf('ukge_progress');

/* Appu says hello (English voice, once per visit) */
if(window.speechSynthesis){
  var msg=new SpeechSynthesisUtterance('Hi! I am Appu the elephant! Which island shall we explore today?');
  var vs=window.speechSynthesis.getVoices();
  function pickEn(){
    var v=window.speechSynthesis.getVoices();
    for(var i=0;i<v.length;i++){ if(/en[-_]IN/i.test(v[i].lang)) return v[i]; }
    for(var i=0;i<v.length;i++){ if(/en[-_]GB/i.test(v[i].lang)) return v[i]; }
    return null;
  }
  var v=pickEn();
  if(v) msg.voice=v;
  msg.rate=0.85; msg.pitch=1.15;
  setTimeout(function(){ try{ window.speechSynthesis.speak(msg); }catch(e){} }, 600);
}
</script>
</body>
</html>
