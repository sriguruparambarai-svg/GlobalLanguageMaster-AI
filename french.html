<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>My French Journey — Global Language Master</title>
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;600;700;800&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet"/>
<style>
:root{
  --bleu:#2A5CAA; --bleu-dark:#1E4480; --bleu-soft:#E4EDFA;
  --mango:#FFB627; --mango-dark:#E89B00; --mango-soft:#FFF3D6;
  --leaf:#57A639; --leaf-soft:#E9F5E1;
  --teal:#0E7C7B; --teal-dark:#095C5B;
  --coral:#FF6B57;
  --cream:#FFF9EF; --ink:#27323A; --sub:#5F7078;
  --locked:#C9D2D6;
}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;}
body{font-family:"Nunito",sans-serif;background:var(--cream);color:var(--ink);}

.topbar{position:sticky;top:0;z-index:50;background:var(--bleu);color:#fff;
  display:flex;align-items:center;gap:14px;padding:12px 18px;
  box-shadow:0 4px 18px rgba(42,92,170,0.35);}
.brand{display:flex;align-items:center;gap:10px;}
.brand .tower{font-size:2rem;}
.brand h1{font-family:"Baloo 2",cursive;font-size:1.2rem;font-weight:800;line-height:1.1;}
.brand small{display:block;font-weight:600;font-size:0.7rem;opacity:0.85;}
.top-stats{margin-left:auto;display:flex;align-items:center;gap:10px;flex-wrap:wrap;}
.pill{background:rgba(255,255,255,0.16);border:1px solid rgba(255,255,255,0.28);
  border-radius:999px;padding:6px 14px;font-weight:800;font-size:0.9rem;display:flex;gap:6px;align-items:center;}
.mode-toggle{cursor:pointer;user-select:none;background:var(--mango);color:var(--ink);border:none;}
.mode-toggle:hover{background:var(--mango-dark);color:#fff;}
.home-link{color:#fff;text-decoration:none;font-weight:800;font-size:0.85rem;
  border-bottom:2px dashed rgba(255,255,255,0.5);padding-bottom:1px;}
.home-link:hover{border-bottom-style:solid;}

.journey-wrap{max-width:560px;margin:0 auto;padding:26px 16px 90px;position:relative;}
.stage-banner{background:var(--bleu);color:#fff;border-radius:18px;padding:14px 20px;
  margin:34px 0 10px;display:flex;align-items:center;gap:12px;
  box-shadow:0 6px 0 var(--bleu-dark);}
.stage-banner.locked{background:var(--locked);box-shadow:0 6px 0 #AEB9BE;color:#5F7078;}
.stage-banner .st-emoji{font-size:1.9rem;}
.stage-banner .st-name{font-family:"Baloo 2",cursive;font-size:1.08rem;font-weight:800;}
.stage-banner .st-sub{font-size:0.78rem;font-weight:700;opacity:0.9;}

.path-block{position:relative;}
.path-svg{position:absolute;inset:0;width:100%;height:100%;pointer-events:none;}
.path-svg path{fill:none;stroke:var(--mango);stroke-width:7;stroke-linecap:round;stroke-dasharray:1 18;}
.node-row{position:relative;height:112px;display:flex;align-items:center;}
.node{position:relative;width:84px;height:84px;border-radius:50%;border:none;cursor:pointer;
  font-size:2rem;display:flex;align-items:center;justify-content:center;
  background:var(--leaf);box-shadow:0 7px 0 #3E7A28;transition:transform 0.12s;}
.node:active{transform:translateY(4px);box-shadow:0 3px 0 #3E7A28;}
.node .node-label{position:absolute;top:100%;margin-top:12px;left:50%;transform:translateX(-50%);
  white-space:nowrap;font-weight:800;font-size:0.8rem;color:var(--ink);
  background:#fff;border-radius:999px;padding:3px 12px;box-shadow:0 2px 8px rgba(0,0,0,0.1);}
.node .stars{position:absolute;top:-16px;left:50%;transform:translateX(-50%);
  font-size:0.85rem;white-space:nowrap;text-shadow:0 1px 2px rgba(0,0,0,0.25);}
.node.current{background:var(--mango);box-shadow:0 7px 0 var(--mango-dark);animation:pulse 1.6s infinite;}
.node.current:active{box-shadow:0 3px 0 var(--mango-dark);}
.node.locked{background:var(--locked);box-shadow:0 7px 0 #AEB9BE;cursor:not-allowed;filter:grayscale(0.4);}
@keyframes pulse{0%,100%{transform:scale(1);}50%{transform:scale(1.07);}}
.mascot{position:absolute;font-size:2.2rem;top:-46px;left:50%;transform:translateX(-50%);
  animation:bob 1.4s ease-in-out infinite;pointer-events:none;}
@keyframes bob{0%,100%{transform:translateX(-50%) translateY(0);}50%{transform:translateX(-50%) translateY(-8px);}}

.lesson-modal{position:fixed;inset:0;background:var(--cream);z-index:100;display:none;
  flex-direction:column;overflow-y:auto;}
.lesson-modal.open{display:flex;}
.lesson-top{display:flex;align-items:center;gap:14px;padding:14px 18px;}
.close-btn{background:none;border:none;font-size:1.7rem;cursor:pointer;color:var(--sub);font-weight:800;}
.progress-track{flex:1;height:16px;background:#EADFC8;border-radius:999px;overflow:hidden;}
.progress-fill{height:100%;width:0%;background:var(--leaf);border-radius:999px;transition:width 0.35s;}
.lesson-body{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:16px 20px 30px;text-align:center;}

.big-card{background:#fff;border-radius:26px;padding:32px 28px;max-width:490px;width:100%;
  box-shadow:0 10px 0 #EADFC8;}
.big-emoji{font-size:5.4rem;line-height:1;}
.big-fr{font-family:"Baloo 2",cursive;font-size:2.2rem;font-weight:800;color:var(--bleu);margin-top:8px;line-height:1.3;}
.big-translit{font-size:1.2rem;font-weight:800;color:var(--teal);margin-top:4px;}
.big-meaning{font-size:1rem;font-weight:700;color:var(--sub);margin-top:4px;}
.qa-q{font-family:"Baloo 2",cursive;font-size:1.35rem;font-weight:800;color:var(--coral);line-height:1.4;}
.qa-a{font-family:"Baloo 2",cursive;font-size:1.5rem;font-weight:800;color:var(--bleu);margin-top:12px;line-height:1.4;}
.qa-sub{font-size:0.92rem;font-weight:800;color:var(--teal);}
.qa-mean{font-size:0.85rem;font-weight:700;color:var(--sub);}
.qa-tag{display:inline-block;font-size:0.72rem;font-weight:800;letter-spacing:1px;
  color:#fff;border-radius:999px;padding:3px 12px;margin-bottom:6px;}
.hear-btn{margin-top:16px;background:var(--teal);color:#fff;border:none;border-radius:999px;
  padding:13px 28px;font-family:"Baloo 2",cursive;font-size:1.05rem;font-weight:800;cursor:pointer;
  box-shadow:0 5px 0 var(--teal-dark);}
.hear-btn:active{transform:translateY(3px);box-shadow:0 2px 0 var(--teal-dark);}
.say-btn{margin-top:12px;background:var(--coral);color:#fff;border:none;border-radius:999px;
  padding:13px 28px;font-family:"Baloo 2",cursive;font-size:1.05rem;font-weight:800;cursor:pointer;
  box-shadow:0 5px 0 #C74936;display:inline-block;}
.say-btn:active{transform:translateY(3px);box-shadow:0 2px 0 #C74936;}
.say-feedback{margin-top:12px;font-weight:800;font-size:1rem;min-height:26px;}
.repeat-banner{margin-top:16px;background:var(--mango-soft);border:3px dashed var(--mango);
  border-radius:18px;padding:14px 20px;font-family:"Baloo 2",cursive;font-size:1.15rem;
  font-weight:800;color:var(--mango-dark);animation:pulse 1.2s infinite;}
.next-btn{margin-top:24px;background:var(--leaf);color:#fff;border:none;border-radius:999px;
  padding:15px 44px;font-family:"Baloo 2",cursive;font-size:1.2rem;font-weight:800;cursor:pointer;
  box-shadow:0 6px 0 #3E7A28;}
.next-btn:active{transform:translateY(3px);box-shadow:0 3px 0 #3E7A28;}

.quiz-question{font-family:"Baloo 2",cursive;font-size:1.3rem;font-weight:800;color:var(--ink);margin-bottom:18px;max-width:560px;line-height:1.45;}
.quiz-options{display:flex;gap:16px;flex-wrap:wrap;justify-content:center;max-width:680px;}
.opt-btn{background:#fff;border:4px solid #EADFC8;border-radius:22px;cursor:pointer;
  width:180px;padding:18px 10px;font-family:"Nunito",sans-serif;transition:transform 0.1s;}
.opt-btn.wide{width:300px;padding:16px;}
.opt-btn:hover{transform:translateY(-4px);border-color:var(--mango);}
.opt-btn .o-emoji{font-size:2.8rem;}
.opt-btn .o-fr{font-weight:800;font-size:1.1rem;margin-top:6px;color:var(--bleu);}
.opt-btn .o-translit{font-weight:800;font-size:0.82rem;color:var(--teal);}
.opt-btn.right{border-color:var(--leaf);background:var(--leaf-soft);}
.opt-btn.wrong{border-color:var(--coral);background:#FFE9E5;animation:shake 0.4s;}
@keyframes shake{0%,100%{transform:translateX(0);}25%{transform:translateX(-7px);}75%{transform:translateX(7px);}}

.dialog-box{max-width:520px;width:100%;display:flex;flex-direction:column;gap:12px;margin-bottom:8px;}
.d-line{max-width:88%;padding:12px 18px;border-radius:18px;font-weight:700;font-size:1rem;text-align:left;}
.d-line.a{background:#fff;box-shadow:0 4px 0 #EADFC8;align-self:flex-start;border-bottom-left-radius:4px;}
.d-line.b{background:var(--bleu);color:#fff;align-self:flex-end;border-bottom-right-radius:4px;box-shadow:0 4px 0 var(--bleu-dark);}
.d-who{font-size:0.7rem;font-weight:800;opacity:0.75;letter-spacing:0.5px;margin-bottom:2px;}
.d-h{font-size:1.05rem;font-weight:800;}
.d-t{font-size:0.82rem;font-weight:800;opacity:0.85;}
.d-m{font-size:0.75rem;font-weight:700;opacity:0.7;}
.your-turn{background:var(--mango-soft);border:3px dashed var(--mango);border-radius:18px;
  padding:14px 20px;max-width:520px;width:100%;}
.your-turn .yt-label{font-size:0.8rem;font-weight:800;color:var(--mango-dark);letter-spacing:1px;}
.your-turn .yt-h{font-family:"Baloo 2",cursive;font-size:1.3rem;font-weight:800;color:var(--ink);margin-top:4px;line-height:1.4;}
.your-turn .yt-t{font-size:0.98rem;font-weight:800;color:var(--teal);}
.your-turn .yt-m{font-size:0.85rem;font-weight:700;color:var(--sub);}

.chat-wrap{max-width:560px;width:100%;display:flex;flex-direction:column;height:100%;flex:1;}
.chat-msgs{flex:1;overflow-y:auto;display:flex;flex-direction:column;gap:12px;padding:6px 2px 14px;min-height:220px;}
.c-msg{max-width:88%;padding:12px 16px;border-radius:18px;font-weight:700;font-size:1rem;text-align:left;white-space:pre-wrap;}
.c-msg.ai{background:#fff;box-shadow:0 4px 0 #EADFC8;align-self:flex-start;border-bottom-left-radius:4px;}
.c-msg.me{background:var(--bleu);color:#fff;align-self:flex-end;border-bottom-right-radius:4px;box-shadow:0 4px 0 var(--bleu-dark);}
.c-msg.think{color:var(--sub);font-style:italic;background:#fff;align-self:flex-start;}
.chat-input-row{display:flex;gap:8px;padding:10px 0 4px;}
.chat-input{flex:1;border:3px solid #EADFC8;border-radius:999px;padding:12px 18px;font-size:1.02rem;
  font-family:"Nunito",sans-serif;font-weight:700;outline:none;}
.chat-input:focus{border-color:var(--bleu);}
.chat-send{background:var(--bleu);color:#fff;border:none;border-radius:999px;padding:0 24px;
  font-family:"Baloo 2",cursive;font-size:1.05rem;font-weight:800;cursor:pointer;box-shadow:0 4px 0 var(--bleu-dark);}
.chat-mic{background:var(--coral);color:#fff;border:none;border-radius:50%;width:50px;height:50px;
  font-size:1.3rem;cursor:pointer;box-shadow:0 4px 0 #C74936;}
.chat-goal{font-size:0.85rem;font-weight:800;color:var(--sub);padding:4px 0;}

.result-stars{font-size:4rem;letter-spacing:8px;margin:10px 0;}
.result-title{font-family:"Baloo 2",cursive;font-size:1.85rem;font-weight:800;color:var(--bleu);}
.result-sub{font-weight:700;color:var(--sub);margin-top:6px;font-size:1.05rem;}
.confetti-piece{position:fixed;top:-30px;font-size:1.6rem;z-index:200;animation:fall linear forwards;pointer-events:none;}
@keyframes fall{to{transform:translateY(110vh) rotate(540deg);opacity:0.6;}}

@media (max-width:600px){
  .brand h1{font-size:0.92rem;}
  .pill{padding:5px 10px;font-size:0.8rem;}
  .opt-btn{width:140px;}
  .opt-btn.wide{width:100%;}
  .big-emoji{font-size:4.2rem;}
  .big-fr{font-size:1.7rem;}
}
@media (prefers-reduced-motion: reduce){
  .node.current,.mascot,.repeat-banner{animation:none;}
}
</style>
</head>
<body>

<div class="topbar">
  <div class="brand">
    <span class="tower">🗼</span>
    <h1>My French Journey — Mon Voyage Français<small id="tb-school">Global Language Master</small></h1>
  </div>
  <div class="top-stats">
    <div class="pill" title="Days practiced in a row">🔥 <span id="streak-count">0</span></div>
    <div class="pill" title="French stars earned">⭐ <span id="star-count">0</span></div>
    <button class="pill mode-toggle" id="mode-btn" onclick="toggleMode()" title="Class mode (projector) or My mode (headset)">🏫 Class Mode</button>
    <a class="home-link" href="home.html">🏠 Home</a>
  </div>
</div>

<div class="journey-wrap" id="journey"></div>

<div class="lesson-modal" id="lesson-modal">
  <div class="lesson-top">
    <button class="close-btn" onclick="closeLesson()" title="Close lesson">✕</button>
    <div class="progress-track"><div class="progress-fill" id="prog-fill"></div></div>
  </div>
  <div class="lesson-body" id="lesson-body"></div>
</div>

<script>
'use strict';

/* ── school login guard ── */
var SCHOOL=null;
try{ SCHOOL=JSON.parse(localStorage.getItem('glm_school')||'null'); }catch(e){}
if(!SCHOOL || !SCHOOL.code){ location.href='index.html'; }
else if(!SCHOOL.has_french){ location.href='home.html'; }

/* ════════════════ FRENCH LESSON CONTENT ════════════════
   Every item: h = French, t = how to say it, m = meaning, e = picture */
var STAGES=[
  { id:'f1', emoji:'🌱', name:'Stage 1 · Premiers Mots (First Words)', sub:'Everyday French words', type:'words',
    lessons:[
      {id:'f1l1', emoji:'🍎', label:'Les Fruits · Fruits', words:[
        {h:'la pomme', t:'lah POM', m:'apple', e:'🍎'},
        {h:'la banane', t:'lah bah-NAHN', m:'banana', e:'🍌'},
        {h:'la mangue', t:'lah MAHNG', m:'mango', e:'🥭'},
        {h:'le raisin', t:'luh ray-ZAN', m:'grapes', e:'🍇'},
        {h:"l'orange", t:'loh-RAHNZH', m:'orange', e:'🍊'}
      ]},
      {id:'f1l2', emoji:'🐘', label:'Les Animaux · Animals', words:[
        {h:'le chat', t:'luh SHAH', m:'cat', e:'🐱'},
        {h:'le chien', t:'luh SHYAN', m:'dog', e:'🐶'},
        {h:"l'éléphant", t:'lay-lay-FAHN', m:'elephant', e:'🐘'},
        {h:'le lion', t:'luh lee-OHN', m:'lion', e:'🦁'},
        {h:'la vache', t:'lah VAHSH', m:'cow', e:'🐮'}
      ]},
      {id:'f1l3', emoji:'🎨', label:'Les Couleurs · Colours', words:[
        {h:'rouge', t:'ROOZH', m:'red', e:'🔴'},
        {h:'bleu', t:'BLUH', m:'blue', e:'🔵'},
        {h:'vert', t:'VAIR', m:'green', e:'🟢'},
        {h:'jaune', t:'ZHOHN', m:'yellow', e:'🟡'},
        {h:'noir', t:'NWAHR', m:'black', e:'⚫'}
      ]},
      {id:'f1l4', emoji:'🔢', label:'Les Nombres · Numbers', words:[
        {h:'un', t:'UHN', m:'one', e:'1️⃣'},
        {h:'deux', t:'DUH', m:'two', e:'2️⃣'},
        {h:'trois', t:'TRWAH', m:'three', e:'3️⃣'},
        {h:'quatre', t:'KATR', m:'four', e:'4️⃣'},
        {h:'cinq', t:'SANK', m:'five', e:'5️⃣'}
      ]},
      {id:'f1l5', emoji:'👨‍👩‍👧', label:'La Famille · Family', words:[
        {h:'la mère', t:'lah MAIR', m:'mother', e:'👩'},
        {h:'le père', t:'luh PAIR', m:'father', e:'👨'},
        {h:'le frère', t:'luh FRAIR', m:'brother', e:'👦'},
        {h:'la sœur', t:'lah SUHR', m:'sister', e:'👧'},
        {h:'le bébé', t:'luh bay-BAY', m:'baby', e:'👶'}
      ]},
      {id:'f1l6', emoji:'🙋', label:'Le Corps · My Body', words:[
        {h:"l'œil", t:'LUH-yuh', m:'eye', e:'👁️'},
        {h:"l'oreille", t:'loh-RAY', m:'ear', e:'👂'},
        {h:'le nez', t:'luh NAY', m:'nose', e:'👃'},
        {h:'la main', t:'lah MAN', m:'hand', e:'✋'},
        {h:'la jambe', t:'lah ZHAHMB', m:'leg', e:'🦵'}
      ]}
    ]
  },

  { id:'f2', emoji:'💬', name:'Stage 2 · Petites Phrases (Small Sentences)', sub:'Little sentences about me', type:'words',
    lessons:[
      {id:'f2l1', emoji:'🙂', label:'Je suis… · I am…', words:[
        {h:'Je suis content.', t:'zhuh swee kohn-TAHN', m:'I am happy.', e:'😄'},
        {h:'Je vais bien.', t:'zhuh vay BYAN', m:'I am fine.', e:'👍'},
        {h:'Je suis prêt.', t:'zhuh swee PREH', m:'I am ready.', e:'✅'},
        {h:"J'ai faim.", t:'zhay FAM', m:'I am hungry.', e:'🍛'},
        {h:'Je suis élève.', t:'zhuh swee zay-LEV', m:'I am a student.', e:'🧑‍🎓'}
      ]},
      {id:'f2l2', emoji:'👉', label:"C'est… · This is…", words:[
        {h:"C'est mon sac.", t:'say mohn SAHK', m:'This is my bag.', e:'🎒'},
        {h:"C'est mon livre.", t:'say mohn LEEVR', m:'This is my book.', e:'📖'},
        {h:"C'est ma maison.", t:'say mah may-ZOHN', m:'This is my house.', e:'🏠'},
        {h:"C'est mon école.", t:'say mohn ay-KOHL', m:'This is my school.', e:'🏫'},
        {h:"C'est mon ami.", t:'say mohn ah-MEE', m:'This is my friend.', e:'🤝'}
      ]},
      {id:'f2l3', emoji:'❤️', label:"J'aime… · I like…", words:[
        {h:"J'aime les mangues.", t:'zhem lay MAHNG', m:'I like mangoes.', e:'🥭'},
        {h:"J'aime les jeux.", t:'zhem lay ZHUH', m:'I like games.', e:'⚽'},
        {h:"J'aime les chansons.", t:'zhem lay shahn-SOHN', m:'I like songs.', e:'🎵'},
        {h:"J'aime dessiner.", t:'zhem day-see-NAY', m:'I like drawing.', e:'🎨'},
        {h:"J'aime lire.", t:'zhem LEER', m:'I like reading.', e:'📚'}
      ]},
      {id:'f2l4', emoji:'🤲', label:"J'ai… · I have…", words:[
        {h:"J'ai deux yeux.", t:'zhay duh ZYUH', m:'I have two eyes.', e:'👀'},
        {h:"J'ai un crayon.", t:'zhay uhn kray-OHN', m:'I have a pencil.', e:'✏️'},
        {h:"J'ai un parapluie.", t:'zhay uhn pah-rah-PLWEE', m:'I have an umbrella.', e:'☔'},
        {h:"J'ai une sœur.", t:'zhay ewn SUHR', m:'I have a sister.', e:'👧'},
        {h:"J'ai un sac rouge.", t:'zhay uhn sahk ROOZH', m:'I have a red bag.', e:'🎒'}
      ]},
      {id:'f2l5', emoji:'💪', label:'Je peux… · I can…', words:[
        {h:'Je peux courir.', t:'zhuh puh koo-REER', m:'I can run.', e:'🏃'},
        {h:'Je peux lire.', t:'zhuh puh LEER', m:'I can read.', e:'📚'},
        {h:'Je peux chanter.', t:'zhuh puh shahn-TAY', m:'I can sing.', e:'🎤'},
        {h:'Je peux sauter.', t:'zhuh puh soh-TAY', m:'I can jump.', e:'🦘'},
        {h:'Je peux écrire.', t:'zhuh puh zay-KREER', m:'I can write.', e:'✍️'}
      ]}
    ]
  },

  { id:'f3', emoji:'❓', name:'Stage 3 · Questions et Réponses (Q&A)', sub:'Ask and answer in French', type:'qa',
    lessons:[
      {id:'f3l1', emoji:'🙋', label:'Sur Moi · About Me', qa:[
        {q:"Comment tu t'appelles?", qt:'koh-MAHN tew tah-PEL?', a:"Je m'appelle Ravi.", at:'zhuh mah-PEL Ravi', m:'What is your name? — My name is Ravi.', e:'🙋', key:'appelle'},
        {q:'Comment ça va?', qt:'koh-MAHN sah VAH?', a:'Ça va bien, merci.', at:'sah vah BYAN, mair-SEE', m:'How are you? — I am fine, thank you.', e:'😊', key:'bien'},
        {q:'Quel âge as-tu?', qt:'kel AHZH ah-TEW?', a:"J'ai sept ans.", at:'zhay set AHN', m:'How old are you? — I am seven years old.', e:'🎂', key:'ans'},
        {q:'Où habites-tu?', qt:'oo ah-BEET-tew?', a:"J'habite à Chennai.", at:'zhah-BEET ah Chennai', m:'Where do you live? — I live in Chennai.', e:'🏠', key:'habite'},
        {q:'Tu es en quelle classe?', qt:'tew ay ahn kel KLAHS?', a:'Je suis en classe deux.', at:'zhuh swee zahn klahs DUH', m:'Which class are you in? — I am in Class Two.', e:'🏫', key:'classe'}
      ]},

/* ════════════════ PROGRESS (French has its own stars; streak is shared) ════════════════ */
function loadProgress(){
  try{ return JSON.parse(localStorage.getItem('glmf_progress')||'{}'); }catch(e){ return {}; }
}
function saveProgress(p){ try{ localStorage.setItem('glmf_progress',JSON.stringify(p)); }catch(e){} }
function totalStars(){
  var p=loadProgress(),t=0,k;
  for(k in p){ if(p[k] && p[k].stars) t+=p[k].stars; }
  return t;
}
function todayStr(){
  var d=new Date();
  return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
}
function yesterdayStr(){
  var y=new Date(); y.setDate(y.getDate()-1);
  return y.getFullYear()+'-'+String(y.getMonth()+1).padStart(2,'0')+'-'+String(y.getDate()).padStart(2,'0');
}
function bumpStreak(){
  var s;
  try{ s=JSON.parse(localStorage.getItem('glm_streak')||'{}'); }catch(e){ s={}; }
  var today=todayStr();
  if(s.last!==today){
    s.count = (s.last===yesterdayStr()) ? (s.count||0)+1 : 1;
    s.last=today;
    try{ localStorage.setItem('glm_streak',JSON.stringify(s)); }catch(e){}
  }
  return s.count||0;
}
function currentStreak(){
  var s;
  try{ s=JSON.parse(localStorage.getItem('glm_streak')||'{}'); }catch(e){ s={}; }
  if(!s.last) return 0;
  return (s.last===todayStr()||s.last===yesterdayStr()) ? (s.count||0) : 0;
}

/* ════════════════ MODE ════════════════ */
var SR = window.SpeechRecognition || window.webkitSpeechRecognition || null;
var mode = localStorage.getItem('glm_mode') || (SR ? 'my' : 'class');
function toggleMode(){
  mode = (mode==='class') ? 'my' : 'class';
  if(mode==='my' && !SR){
    alert('This computer/browser cannot listen to speech.\nClass Mode will be used — everyone repeats aloud together!');
    mode='class';
  }
  try{ localStorage.setItem('glm_mode',mode); }catch(e){}
  renderModeBtn();
}
function renderModeBtn(){
  var b=document.getElementById('mode-btn');
  b.textContent = (mode==='class') ? '🏫 Class Mode' : '🎧 My Mode';
}

/* ════════════════ FRENCH VOICE ════════════════ */
var frVoice=null;
function pickVoice(){
  var vs=window.speechSynthesis ? window.speechSynthesis.getVoices() : [];
  var i;
  frVoice=null;
  for(i=0;i<vs.length;i++){ if(/fr[-_]FR/i.test(vs[i].lang)){ frVoice=vs[i]; return; } }
  for(i=0;i<vs.length;i++){ if(/^fr/i.test(vs[i].lang)){ frVoice=vs[i]; return; } }
}
if(window.speechSynthesis){
  pickVoice();
  window.speechSynthesis.onvoiceschanged=pickVoice;
}
/* Speak French; if no French voice, speak the pronunciation hint instead */
function sayFr(hText, tText, cb){
  if(!window.speechSynthesis){ if(cb)cb(); return; }
  window.speechSynthesis.cancel();
  var u=new SpeechSynthesisUtterance(frVoice ? hText : (tText||hText));
  if(frVoice){ u.voice=frVoice; u.lang='fr-FR'; }
  u.rate=0.8; u.pitch=1.05;
  if(cb) u.onend=cb;
  window.speechSynthesis.speak(u);
}

/* ════════════════ UNLOCK RULES ════════════════ */
function stageComplete(si){
  var p=loadProgress();
  return STAGES[si].lessons.every(function(l){ return p[l.id] && p[l.id].stars>0; });
}
function stageUnlocked(si){
  if(si===0) return true;
  return stageComplete(si-1);
}
function lessonUnlocked(si, li){
  if(!stageUnlocked(si)) return false;
  if(li===0) return true;
  var prev=STAGES[si].lessons[li-1];
  var p=loadProgress();
  return !!(p[prev.id] && p[prev.id].stars>0);
}

/* ════════════════ PATH RENDERING ════════════════ */
function renderJourney(){
  var wrap=document.getElementById('journey');
  wrap.innerHTML='';
  var p=loadProgress();
  var mascotPlaced=false;

  STAGES.forEach(function(stage, si){
    var unlockedStage=stageUnlocked(si);
    var banner=document.createElement('div');
    banner.className='stage-banner'+(unlockedStage?'':' locked');
    var subText = unlockedStage ? stage.sub : 'Finish the stage above to open this';
    banner.innerHTML='<span class="st-emoji">'+stage.emoji+'</span>'+
      '<div><div class="st-name">'+stage.name+'</div><div class="st-sub">'+subText+'</div></div>';
    wrap.appendChild(banner);

    var block=document.createElement('div');
    block.className='path-block';
    var svg=document.createElementNS('http://www.w3.org/2000/svg','svg');
    svg.setAttribute('class','path-svg');
    var pathEl=document.createElementNS('http://www.w3.org/2000/svg','path');
    svg.appendChild(pathEl);
    block.appendChild(svg);

    var pts=[];
    stage.lessons.forEach(function(lesson, li){
      var row=document.createElement('div');
      row.className='node-row';
      var xPercent = 50 + 32*Math.sin(li*1.1);
      var node=document.createElement('button');
      var unlocked=lessonUnlocked(si,li);
      var done=!!(p[lesson.id] && p[lesson.id].stars>0);
      var cls='node';
      if(!unlocked) cls+=' locked';
      else if(done) cls+=' done';
      else cls+=' current';
      node.className=cls;
      node.style.position='absolute';
      node.style.left='calc('+xPercent+'% - 42px)';
      node.innerHTML=(unlocked?lesson.emoji:'🔒')+
        '<span class="node-label">'+lesson.label+'</span>'+
        (done?'<span class="stars">'+'⭐'.repeat(p[lesson.id].stars)+'</span>':'');
      if(unlocked){
        node.onclick=(function(s,l){return function(){openLesson(s,l);};})(si,li);
      }else{
        node.onclick=function(){ sayFr("Finis d'abord la leçon précédente!", 'Finish the lesson before this one first!'); };
      }
      if(cls.indexOf('current')>=0 && !mascotPlaced){
        var m=document.createElement('span');
        m.className='mascot'; m.textContent='🗼';
        node.appendChild(m);
        mascotPlaced=true;
      }
      row.appendChild(node);
      block.appendChild(row);
      pts.push({x:xPercent, y:li*112+56});
    });

    wrap.appendChild(block);

    var w=block.clientWidth||520;
    var h=stage.lessons.length*112;
    svg.setAttribute('viewBox','0 0 '+w+' '+h);
    var d='';
    pts.forEach(function(pt,i){
      var px=pt.x/100*w, py=pt.y;
      if(i===0){ d+='M '+px+' '+py; }
      else{
        var prev=pts[i-1];
        var prx=prev.x/100*w, pry=prev.y;
        var midY=(pry+py)/2;
        d+=' C '+prx+' '+midY+', '+px+' '+midY+', '+px+' '+py;
      }
    });
    pathEl.setAttribute('d',d);
  });

  document.getElementById('star-count').textContent=totalStars();
  document.getElementById('streak-count').textContent=currentStreak();
}

/* ════════════════ SHARED LESSON STATE ════════════════ */
var L={stage:0,lesson:0,step:0,phase:'learn',score:0,quiz:[],chatCount:0,chatHistory:[]};
function stageType(){ return STAGES[L.stage].type; }
function curLesson(){ return STAGES[L.stage].lessons[L.lesson]; }

function openLesson(si,li){
  L={stage:si,lesson:li,step:0,phase:'learn',score:0,quiz:[],chatCount:0,chatHistory:[]};
  var t=STAGES[si].type;
  document.getElementById('lesson-modal').classList.add('open');
  if(t==='words'){ L.quiz=buildWordQuiz(si,li); showLearnStep(); }
  else if(t==='qa'){ L.quiz=buildQaQuiz(si,li); showQaLearnStep(); }
  else if(t==='dialog'){ L.quiz=buildDialogQuiz(si,li); showDialogLearnStep(); }
  else if(t==='chat'){ showChat(); }
}
function closeLesson(){
  if(window.speechSynthesis) window.speechSynthesis.cancel();
  document.getElementById('lesson-modal').classList.remove('open');
  renderJourney();
}
function learnTotal(){
  var t=stageType(), l=curLesson();
  if(t==='words') return l.words.length;
  if(t==='qa') return l.qa.length;
  if(t==='dialog') return l.lines.length;
  return 5;
}
function setProgressBar(){
  var total=learnTotal()+L.quiz.length;
  var doneSteps=(L.phase==='learn') ? L.step : learnTotal()+L.step;
  if(stageType()==='chat'){ total=5; doneSteps=Math.min(L.chatCount,5); }
  document.getElementById('prog-fill').style.width=Math.round(doneSteps/Math.max(total,1)*100)+'%';
}
function micOrRepeatHtml(){
  return (mode==='my' && SR)
    ? '<button class="say-btn" onclick="listenAndCheck()">🎤 À toi! Now you say it!</button><div class="say-feedback" id="say-fb"></div>'
    : '<div class="repeat-banner">🗣️ Tous ensemble! Everyone repeat together!</div>';
}

/* ════════════════ WORDS / SENTENCES (Stages 1–2) ════════════════ */
function showLearnStep(){
  var words=curLesson().words;
  if(L.step>=words.length){ L.phase='quiz'; L.step=0; showQuizStep(); return; }
  setProgressBar();
  var wd=words[L.step];
  var body=document.getElementById('lesson-body');
  body.innerHTML=
    '<div class="big-card">'+
      '<div class="big-emoji">'+wd.e+'</div>'+
      '<div class="big-fr">'+wd.h+'</div>'+
      '<div class="big-translit">'+wd.t+'</div>'+
      '<div class="big-meaning">'+wd.m+'</div>'+
      '<button class="hear-btn" onclick="hearWord()">🔊 Écoute encore · Hear again</button><br/>'+
      micOrRepeatHtml()+
    '</div>'+
    '<button class="next-btn" onclick="nextLearnStep()">Suivant · Next ➜</button>';
  sayFr(wd.h, wd.t);
}
function hearWord(){
  var wd=curLesson().words[L.step];
  sayFr(wd.h, wd.t);
}
function nextLearnStep(){ L.step++; showLearnStep(); }

function checkTargetFr(){
  var t=stageType();
  if(t==='words') return curLesson().words[L.step];
  if(t==='qa'){ var it=curLesson().qa[L.step]; return {h:it.a, t:it.at, key:it.key}; }
  if(t==='dialog'){ var ln=curLesson().lines[L.step]; return {h:ln.h, t:ln.t}; }
  return {h:'',t:''};
}
function listenAndCheck(){
  var fb=document.getElementById('say-fb');
  if(!SR){ if(fb)fb.textContent='Listening not available here.'; return; }
  var target=checkTargetFr();
  var key=(target.key || target.h.replace(/[.!?,']/g,' ').trim().split(' ').filter(function(x){return x.length>2;}).slice(-1)[0]||target.h).toLowerCase();
  fb.textContent='👂 J\u2019écoute… dis: "'+target.h+'"';
  fb.style.color='var(--sub)';
  var rec=new SR();
  rec.lang='fr-FR'; rec.interimResults=false; rec.maxAlternatives=3;
  var answered=false;
  rec.onresult=function(ev){
    answered=true;
    var heard='';
    try{ heard=ev.results[0][0].transcript.toLowerCase(); }catch(e){}
    if(heard.indexOf(key)>=0){
      fb.textContent='✅ Bravo! Très bien!';
      fb.style.color='var(--leaf)';
      sayFr('Bravo!','brah-VOH!');
    }else{
      fb.textContent='Bon essai! J\u2019ai entendu "'+heard+'" — encore une fois!';
      fb.style.color='var(--coral)';
    }
  };
  rec.onerror=function(){ if(!answered){ fb.textContent='Je n\u2019ai pas entendu. Vérifie le micro et réessaie!'; fb.style.color='var(--coral)'; } };
  rec.onend=function(){ if(!answered && fb.textContent.indexOf('écoute')>=0){ fb.textContent='Je n\u2019ai pas entendu — réessaie!'; fb.style.color='var(--coral)'; } };
  try{ rec.start(); }catch(e){ fb.textContent='Le micro est occupé. Réessaie.'; }
}

function shuffle(arr){
  for(var i=arr.length-1;i>0;i--){ var j=Math.floor(Math.random()*(i+1)); var t=arr[i];arr[i]=arr[j];arr[j]=t; }
  return arr;
}
function buildWordQuiz(si,li){
  var words=STAGES[si].lessons[li].words.slice();
  var qs=shuffle(words.map(function(w){ return {answer:w}; }));
  qs.forEach(function(q){
    var pool=shuffle(words.filter(function(w){ return w.h!==q.answer.h; }));
    q.options=shuffle([q.answer,pool[0],pool[1]]);
  });
  return qs;
}
function showQuizStep(){
  if(L.step>=L.quiz.length){ showResult(); return; }
  setProgressBar();
  var q=L.quiz[L.step];
  var wide = q.answer.h.indexOf(' ')>=0;
  var body=document.getElementById('lesson-body');
  var optsHtml=q.options.map(function(o,i){
    return '<button class="opt-btn'+(wide?' wide':'')+'" id="opt-'+i+'" onclick="pickOption('+i+')">'+
      '<div class="o-emoji">'+o.e+'</div><div class="o-fr">'+o.h+'</div><div class="o-translit">'+o.t+'</div></button>';
  }).join('');
  body.innerHTML=
    '<div class="quiz-question">👂 Écoute… puis clique sur le bon!<br/><span style="font-size:0.9rem;color:var(--sub);">Listen, then tap the right one!</span></div>'+
    '<button class="hear-btn" style="margin-bottom:22px;" onclick="sayQuizWord()">🔊 Écoute encore</button>'+
    '<div class="quiz-options">'+optsHtml+'</div>';
  sayQuizWord();
}
function sayQuizWord(){ sayFr(L.quiz[L.step].answer.h, L.quiz[L.step].answer.t); }
function pickOption(i){
  var q=L.quiz[L.step];
  var chosen=q.options[i];
  var btn=document.getElementById('opt-'+i);
  var all=document.querySelectorAll('.opt-btn');
  for(var k=0;k<all.length;k++){ all[k].onclick=null; }
  if(chosen.h===q.answer.h){
    btn.classList.add('right'); L.score++; sayFr('Bonne réponse!','bun ray-POHNS!');
  }else{
    btn.classList.add('wrong');
    q.options.forEach(function(o,idx){
      if(o.h===q.answer.h) document.getElementById('opt-'+idx).classList.add('right');
    });
    sayFr('La réponse est '+q.answer.h, 'The answer is '+q.answer.t);
  }
  setTimeout(function(){ L.step++; showQuizStep(); },1500);
}

/* ════════════════ Q&A (Stage 3) ════════════════ */
function showQaLearnStep(){
  var qa=curLesson().qa;
  if(L.step>=qa.length){ L.phase='quiz'; L.step=0; showQaQuizStep(); return; }
  setProgressBar();
  var item=qa[L.step];
  var body=document.getElementById('lesson-body');
  body.innerHTML=
    '<div class="big-card">'+

      '<span class="qa-tag" style="background:var(--bleu);margin-top:14px;">TA RÉPONSE · YOUR ANSWER</span>'+
      '<div class="qa-a">'+item.a+'</div>'+

      micOrRepeatHtml()+

function hearQa(){
  var item=curLesson().qa[L.step];
  sayFr(item.q, item.qt, function(){ setTimeout(function(){ sayFr(item.a, item.at); },400); });
}
function nextQaStep(){ L.step++; showQaLearnStep(); }

function buildQaQuiz(si,li){
  var qa=STAGES[si].lessons[li].qa.slice();
  var qs=shuffle(qa.map(function(x){ return {answer:x}; }));
  qs.forEach(function(q){
    var pool=shuffle(qa.filter(function(x){ return x.a!==q.answer.a; }));
    q.options=shuffle([q.answer,pool[0],pool[1]]);
  });
  return qs;
}
function showQaQuizStep(){
  if(L.step>=L.quiz.length){ showResult(); return; }
  setProgressBar();
  var q=L.quiz[L.step];
  var body=document.getElementById('lesson-body');
  var optsHtml=q.options.map(function(o,i){
    return '<button class="opt-btn wide" id="opt-'+i+'" onclick="pickQaOption('+i+')">'+
      '<div class="o-emoji">'+o.e+'</div><div class="o-fr">'+o.a+'</div><div class="o-translit">'+o.at+'</div></button>';
  }).join('');
  body.innerHTML=
    '<div class="quiz-question">❓ '+q.answer.q+'<br/><span class="qa-sub">'+q.answer.qt+'</span><br/>'+
    '<span style="font-size:0.9rem;color:var(--sub);">Choisis la bonne réponse · Tap the best answer!</span></div>'+
    '<button class="hear-btn" style="margin-bottom:20px;" onclick="sayQaQuestion()">🔊 Écoute la question</button>'+
    '<div class="quiz-options">'+optsHtml+'</div>';
  sayQaQuestion();
}
function sayQaQuestion(){ sayFr(L.quiz[L.step].answer.q, L.quiz[L.step].answer.qt); }
function pickQaOption(i){
  var q=L.quiz[L.step];
  var chosen=q.options[i];
  var btn=document.getElementById('opt-'+i);
  var all=document.querySelectorAll('.opt-btn');
  for(var k=0;k<all.length;k++){ all[k].onclick=null; }
  if(chosen.a===q.answer.a){
    btn.classList.add('right'); L.score++; sayFr('Bonne réponse!','bun ray-POHNS!');
  }else{
    btn.classList.add('wrong');
    q.options.forEach(function(o,idx){
      if(o.a===q.answer.a) document.getElementById('opt-'+idx).classList.add('right');
    });
    sayFr('La réponse est: '+q.answer.a, 'The answer is: '+q.answer.at);
  }
  setTimeout(function(){ L.step++; showQaQuizStep(); },1600);
}

/* ════════════════ DIALOGUE (Stage 4) ════════════════ */
function dLineHtml(line, whoName){
  return '<div class="d-line '+line.who.toLowerCase()+'"><div class="d-who">'+whoName+'</div>'+
    '<div class="d-h">'+line.h+'</div><div class="d-t">'+line.t+'</div><div class="d-m">'+line.m+'</div></div>';
}
function dialogSoFarHtml(upto){
  var l=curLesson();
  var html='<div class="dialog-box">';
  for(var i=0;i<=upto && i<l.lines.length;i++){
    var line=l.lines[i];
    html+=dLineHtml(line, (line.who==='A')?l.whoA:l.whoB);
  }
  html+='</div>';
  return html;
}
function showDialogLearnStep(){
  var l=curLesson();
  if(L.step>=l.lines.length){ L.phase='quiz'; L.step=0; showDialogQuizStep(); return; }
  setProgressBar();
  var line=l.lines[L.step];
  var body=document.getElementById('lesson-body');

  if(line.who==='A'){
    body.innerHTML=
      dialogSoFarHtml(L.step)+
      '<button class="hear-btn" onclick="hearDialogLine()">🔊 Écoute encore</button>'+
      '<button class="next-btn" onclick="nextDialogStep()">Suivant ➜</button>';
    sayFr(line.h, line.t);
  }else{
    body.innerHTML=
      dialogSoFarHtml(L.step-1)+
      '<div class="your-turn"><div class="yt-label">🫵 À TOI — DIS · YOUR TURN — SAY:</div>'+
      '<div class="yt-h">'+line.h+'</div><div class="yt-t">'+line.t+'</div><div class="yt-m">'+line.m+'</div></div>'+
      '<button class="hear-btn" onclick="hearDialogLine()">🔊 Écoute d\u2019abord</button><br/>'+
      micOrRepeatHtml()+
      '<button class="next-btn" onclick="nextDialogStep()">Je l\u2019ai dit! ➜</button>';
    sayFr(line.h, line.t);
  }
}
function hearDialogLine(){ var ln=curLesson().lines[L.step]; sayFr(ln.h, ln.t); }
function nextDialogStep(){ L.step++; showDialogLearnStep(); }

function buildDialogQuiz(si,li){
  var lesson=STAGES[si].lessons[li];
  var pairs=[];
  lesson.lines.forEach(function(line,i){
    if(line.who==='A' && lesson.lines[i+1] && lesson.lines[i+1].who==='B'){
      pairs.push({q:lesson.lines[i], a:lesson.lines[i+1]});
    }
  });
  var allB=pairs.map(function(p){ return p.a; });
  var qs=shuffle(pairs.map(function(p){ return {answer:p}; }));
  qs.forEach(function(q){
    var pool=shuffle(allB.filter(function(b){ return b.h!==q.answer.a.h; }));
    var o1=pool[0]||{h:'Je ne sais pas.',t:'zhuh nuh say PAH',m:'I do not know.'};
    var o2=pool[1]||{h:'Rien, merci.',t:'RYAN, mair-SEE',m:'Nothing, thank you.'};
    q.options=shuffle([q.answer.a,o1,o2]);
  });
  return qs;
}
function showDialogQuizStep(){
  if(L.step>=L.quiz.length){ showResult(); return; }
  setProgressBar();
  var q=L.quiz[L.step];
  var l=curLesson();
  var body=document.getElementById('lesson-body');
  var optsHtml=q.options.map(function(o,i){
    return '<button class="opt-btn wide" id="opt-'+i+'" onclick="pickDialogOption('+i+')">'+
      '<div class="o-fr">'+o.h+'</div><div class="o-translit">'+o.t+'</div></button>';
  }).join('');
  body.innerHTML=
    '<div class="quiz-question">'+l.whoA+' dit:<br/>“'+q.answer.q.h+'”<br/><span class="qa-sub">'+q.answer.q.t+'</span><br/>'+
    '<span style="font-size:0.9rem;color:var(--sub);">Que réponds-tu? · What do YOU say back?</span></div>'+
    '<button class="hear-btn" style="margin-bottom:20px;" onclick="sayDialogQ()">🔊 Écoute encore</button>'+
    '<div class="quiz-options">'+optsHtml+'</div>';
  sayDialogQ();
}
function sayDialogQ(){ sayFr(L.quiz[L.step].answer.q.h, L.quiz[L.step].answer.q.t); }
function pickDialogOption(i){
  var q=L.quiz[L.step];
  var chosen=q.options[i];
  var btn=document.getElementById('opt-'+i);
  var all=document.querySelectorAll('.opt-btn');
  for(var k=0;k<all.length;k++){ all[k].onclick=null; }
  if(chosen.h===q.answer.a.h){
    btn.classList.add('right'); L.score++; sayFr('Bonne réponse!','bun ray-POHNS!');
  }else{
    btn.classList.add('wrong');
    q.options.forEach(function(o,idx){
      if(o.h===q.answer.a.h) document.getElementById('opt-'+idx).classList.add('right');
    });
    sayFr('Tu réponds: '+q.answer.a.h, 'You say: '+q.answer.a.t);
  }
  setTimeout(function(){ L.step++; showDialogQuizStep(); },1600);
}

/* ════════════════ FREE TALK WITH AI (Stage 5) ════════════════ */
var CHAT_GOAL=5;
function showChat(){
  var l=curLesson();
  L.chatHistory=[];
  L.chatCount=0;
  var body=document.getElementById('lesson-body');
  body.innerHTML=
    '<div class="chat-wrap">'+
      '<div class="chat-goal">🎯 Envoie '+CHAT_GOAL+' messages et gagne tes étoiles! (<span id="chat-done">0</span>/'+CHAT_GOAL+')</div>'+
      '<div class="chat-msgs" id="chat-msgs"></div>'+
      '<div class="chat-input-row">'+
        ((mode==='my'&&SR)?'<button class="chat-mic" onclick="chatMic()" title="Parle pour écrire">🎤</button>':'')+
        '<input class="chat-input" id="chat-input" placeholder="Écris en français ou en anglais…" onkeydown="if(event.key===\'Enter\')sendChat()"/>'+
        '<button class="chat-send" onclick="sendChat()">Envoyer</button>'+
      '</div>'+
    '</div>';
  setProgressBar();
  var opener='Bonjour! Je suis ton professeur de français. (bohn-ZHOOR! zhuh swee tohn proh-feh-SUHR duh frahn-SAY.) — Hello! I am your French teacher.\nComment était ta journée? (koh-MAHN ay-TAY tah zhoor-NAY?) — How was your day?';
  addChatMsg('ai',opener);
  sayFr('Bonjour! Je suis ton professeur de français. Comment était ta journée?','Hello! I am your French teacher. How was your day?');
}
function addChatMsg(who,text){
  var box=document.getElementById('chat-msgs');
  if(!box) return null;
  var d=document.createElement('div');
  d.className='c-msg '+who;
  d.textContent=text;
  box.appendChild(d);
  box.scrollTop=box.scrollHeight;
  return d;
}
function sendChat(){
  var inp=document.getElementById('chat-input');
  var text=(inp.value||'').trim();
  if(!text) return;
  inp.value='';
  addChatMsg('me',text);
  L.chatHistory.push({role:'user',content:text});
  L.chatCount++;
  var doneEl=document.getElementById('chat-done');
  if(doneEl) doneEl.textContent=Math.min(L.chatCount,CHAT_GOAL);
  setProgressBar();

  var thinking=addChatMsg('think','Le professeur réfléchit…');
  var l=curLesson();
  var systemPrompt='You are a warm, patient French teacher for young school children in Tamil Nadu, India who are just beginning French as a third language. '+
    'Topic today: '+l.topic+'. Rules: '+
    '1) Reply in VERY simple French — 1 or 2 short sentences maximum. '+
    '2) FORMAT EVERY SENTENCE EXACTLY LIKE THIS: French sentence (simple english-letter pronunciation) — English meaning. Example: Comment ça va? (koh-MAHN sah VAH?) — How are you? '+
    '3) The child may write in French or English — understand both. '+
    '4) If the child makes a French mistake, gently show the correct sentence once in the same three-part format. '+
    '5) Always end with one simple question to keep the child talking. '+
    '6) Be cheerful and encouraging. Never discuss anything unsuitable for children.';

  fetch('/api/ai',{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({payload:{
      model:'claude-sonnet-4-5',
      max_tokens:350,
      system:systemPrompt,
      messages:L.chatHistory.slice(-12)
    }})
  }).then(function(r){ return r.json(); })
  .then(function(data){
    if(thinking) thinking.remove();
    var reply='';
    if(data && data.content && data.content[0] && data.content[0].text){ reply=data.content[0].text; }
    else{ reply='Petit problème! (puh-TEE proh-BLEM!) — Small problem! Renvoie ton message. (rahn-VWAH tohn meh-SAHZH.) — Send again.'; }
    addChatMsg('ai',reply);
    L.chatHistory.push({role:'assistant',content:reply});
    var frOnly=reply.replace(/\([^)]*\)/g,'').replace(/—[^\n]*/g,'').replace(/\n+/g,' ').trim();
    sayFr(frOnly, reply);
    if(L.chatCount>=CHAT_GOAL){
      setTimeout(function(){ finishChat(); },2800);
    }
  }).catch(function(){
    if(thinking) thinking.remove();
    addChatMsg('ai','Problème d\u2019internet! Renvoie ton message. (Internet problem! Send again.)');
  });
}
function chatMic(){
  if(!SR) return;
  var inp=document.getElementById('chat-input');
  inp.placeholder='👂 J\u2019écoute…';
  var rec=new SR();
  rec.lang='fr-FR'; rec.interimResults=false;
  rec.onresult=function(ev){
    try{ inp.value=ev.results[0][0].transcript; }catch(e){}
    inp.placeholder='Écris en français ou en anglais…';
  };
  rec.onerror=function(){ inp.placeholder='Je n\u2019ai pas entendu — écris!'; };
  rec.onend=function(){ if(inp.placeholder.indexOf('écoute')>=0) inp.placeholder='Écris en français ou en anglais…'; };
  try{ rec.start(); }catch(e){}
}
function finishChat(){
  var lesson=curLesson();
  var p=loadProgress();
  var old=(p[lesson.id]&&p[lesson.id].stars)||0;
  if(3>old){ p[lesson.id]={stars:3}; saveProgress(p); }
  bumpStreak();
  confettiBurst();
  var body=document.getElementById('lesson-body');
  document.getElementById('prog-fill').style.width='100%';
  body.innerHTML=
    '<div class="result-title">🎉 Magnifique!</div>'+
    '<div class="result-stars">⭐⭐⭐</div>'+
    '<div class="result-sub">Tu as parlé français '+CHAT_GOAL+' fois! Real French practice!</div>'+
    '<button class="next-btn" onclick="closeLesson()">Retour à mon voyage ➜</button>';
  sayFr('Magnifique! Tu as gagné trois étoiles!','Magnificent! You won three stars!');
}

/* ════════════════ RESULT ════════════════ */
function showResult(){
  document.getElementById('prog-fill').style.width='100%';
  var total=L.quiz.length||1;
  var ratio=L.score/total;
  var stars = ratio>=0.99?3 : ratio>=0.75?2 : ratio>=0.5?1 : 0;
  var body=document.getElementById('lesson-body');
  var lesson=curLesson();

  if(stars>0){
    var p=loadProgress();
    var old=(p[lesson.id]&&p[lesson.id].stars)||0;
    if(stars>old){ p[lesson.id]={stars:stars}; saveProgress(p); }
    bumpStreak();
    confettiBurst();
    body.innerHTML=
      '<div class="result-title">🎉 Bravo!</div>'+
      '<div class="result-stars">'+'⭐'.repeat(stars)+'<span style="opacity:0.25;">'+'⭐'.repeat(3-stars)+'</span></div>'+
      '<div class="result-sub">'+L.score+' sur '+total+' correct! ('+L.score+' out of '+total+' right!)</div>'+
      '<button class="next-btn" onclick="closeLesson()">Retour à mon voyage ➜</button>';
    sayFr('Bravo! Tu as gagné '+stars+(stars===1?' étoile!':' étoiles!'), 'Bravo! You won '+stars+' stars!');
  }else{
    body.innerHTML=
      '<div class="result-title">💪 Bon essai!</div>'+
      '<div class="result-sub">'+L.score+' sur '+total+'. Apprenons encore une fois!</div>'+
      '<button class="next-btn" onclick="retryLesson()">Réessaie ➜</button>'+
      '<br/><button class="hear-btn" style="margin-top:14px;" onclick="closeLesson()">Retour à mon voyage</button>';
    sayFr('Bon essai! Apprenons encore une fois.','Good try! Let us learn once more.');
  }
}
function retryLesson(){ openLesson(L.stage,L.lesson); }

function confettiBurst(){
  var emojis=['🎉','⭐','🎊','✨','🗼'];
  for(var i=0;i<24;i++){
    var el=document.createElement('div');
    el.className='confetti-piece';
    el.textContent=emojis[Math.floor(Math.random()*emojis.length)];
    el.style.left=Math.random()*100+'vw';
    el.style.animationDuration=(2+Math.random()*2)+'s';
    document.body.appendChild(el);
    setTimeout(function(node){ return function(){ node.remove(); }; }(el), 4500);
  }
}

if(SCHOOL && SCHOOL.name){ var tbs=document.getElementById('tb-school'); if(tbs) tbs.textContent=SCHOOL.name; }

renderJourney();
