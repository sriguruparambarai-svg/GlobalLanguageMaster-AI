<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>DigiKids — Senior KG · English — Global Language Master</title>
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;600;700;800&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet"/>
<style>
:root{
  --sun:#F26B21; --sun-dark:#C24E12; --sun-soft:#FDE9DC;
  --grape:#EF6C00; --grape-dark:#B54700;
  --mango:#FFB627; --mango-dark:#E89B00; --mango-soft:#FFF3D6;
  --leaf:#57A639; --leaf-soft:#E9F5E1;
  --teal:#0E7C7B; --teal-dark:#095C5B;
  --coral:#FF6B57;
  --cream:#FFF9EF; --ink:#27323A; --sub:#5F7078;
  --locked:#C9D2D6;
}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;}
body{font-family:"Nunito",sans-serif;background:var(--cream);color:var(--ink);}

.topbar{position:sticky;top:0;z-index:50;background:var(--grape);color:#fff;
  display:flex;align-items:center;gap:14px;padding:12px 18px;
  box-shadow:0 4px 18px rgba(0,0,0,0.25);}
.brand{display:flex;align-items:center;gap:10px;}
.brand .icon{font-size:2rem;}
.brand h1{font-family:"Baloo 2",cursive;font-size:1.15rem;font-weight:800;line-height:1.1;}
.brand small{display:block;font-weight:600;font-size:0.7rem;opacity:0.85;}
.top-stats{margin-left:auto;display:flex;align-items:center;gap:10px;flex-wrap:wrap;}
.pill{background:rgba(255,255,255,0.16);border:1px solid rgba(255,255,255,0.28);
  border-radius:999px;padding:6px 14px;font-weight:800;font-size:0.9rem;display:flex;gap:6px;align-items:center;}
.mode-toggle{cursor:pointer;user-select:none;background:var(--mango);color:var(--ink);border:none;}
.mode-toggle:hover{background:var(--mango-dark);color:#fff;}
.home-link{color:#fff;text-decoration:none;font-weight:800;font-size:0.85rem;
  border-bottom:2px dashed rgba(255,255,255,0.5);padding-bottom:1px;}
.home-link:hover{border-bottom-style:solid;}

.journey-wrap{max-width:560px;margin:0 auto;padding:26px 16px 90px;position:relative;}
.stage-banner{background:var(--grape);color:#fff;border-radius:18px;padding:14px 20px;
  margin:34px 0 10px;display:flex;align-items:center;gap:12px;
  box-shadow:0 6px 0 var(--grape-dark);}
.stage-banner.locked{background:var(--locked);box-shadow:0 6px 0 #AEB9BE;color:#5F7078;}
.stage-banner .st-emoji{font-size:1.9rem;}
.stage-banner .st-name{font-family:"Baloo 2",cursive;font-size:1.05rem;font-weight:800;}
.stage-banner .st-sub{font-size:0.78rem;font-weight:700;opacity:0.9;}

.path-block{position:relative;}
.path-svg{position:absolute;inset:0;width:100%;height:100%;pointer-events:none;}
.path-svg path{fill:none;stroke:var(--mango);stroke-width:7;stroke-linecap:round;stroke-dasharray:1 18;}
.node-row{position:relative;height:112px;display:flex;align-items:center;}
.node{position:relative;width:84px;height:84px;border-radius:50%;border:none;cursor:pointer;
  font-size:1.8rem;display:flex;align-items:center;justify-content:center;
  background:var(--leaf);box-shadow:0 7px 0 #3E7A28;transition:transform 0.12s;font-family:"Baloo 2",cursive;font-weight:800;color:#fff;}
.node:active{transform:translateY(4px);box-shadow:0 3px 0 #3E7A28;}
.node .node-label{position:absolute;top:100%;margin-top:12px;left:50%;transform:translateX(-50%);
  white-space:nowrap;font-weight:800;font-size:0.78rem;color:var(--ink);
  background:#fff;border-radius:999px;padding:3px 12px;box-shadow:0 2px 8px rgba(0,0,0,0.1);font-family:"Nunito",sans-serif;}
.node .stars{position:absolute;top:-16px;left:50%;transform:translateX(-50%);
  font-size:0.85rem;white-space:nowrap;text-shadow:0 1px 2px rgba(0,0,0,0.25);}
.node.current{background:var(--mango);box-shadow:0 7px 0 var(--mango-dark);animation:pulse 1.6s infinite;}
.node.current:active{box-shadow:0 3px 0 var(--mango-dark);}
.node.locked{background:var(--locked);box-shadow:0 7px 0 #AEB9BE;cursor:not-allowed;filter:grayscale(0.4);}
@keyframes pulse{0%,100%{transform:scale(1);}50%{transform:scale(1.07);}}
.mascot{position:absolute;font-size:2.2rem;top:-46px;left:50%;transform:translateX(-50%);
  animation:bob 1.4s ease-in-out infinite;pointer-events:none;}
@keyframes bob{0%,100%{transform:translateX(-50%) translateY(0);}50%{transform:translateX(-50%) translateY(-8px);}}

.lesson-modal{position:fixed;inset:0;background:var(--cream);z-index:100;display:none;
  flex-direction:column;overflow-y:auto;}
.lesson-modal.open{display:flex;}
.lesson-top{display:flex;align-items:center;gap:14px;padding:14px 18px;}
.close-btn{background:none;border:none;font-size:1.7rem;cursor:pointer;color:var(--sub);font-weight:800;}
.progress-track{flex:1;height:16px;background:#EADFC8;border-radius:999px;overflow:hidden;}
.progress-fill{height:100%;width:0%;background:var(--leaf);border-radius:999px;transition:width 0.35s;}
.lesson-body{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:16px 20px 30px;text-align:center;}

.big-card{background:#fff;border-radius:26px;padding:30px 26px;max-width:490px;width:100%;
  box-shadow:0 10px 0 #EADFC8;}
.giant-letter{font-family:"Baloo 2",cursive;font-size:5.4rem;font-weight:800;color:var(--grape);line-height:1.1;}
.blend-line{font-family:"Baloo 2",cursive;font-size:2.4rem;font-weight:800;color:var(--sun);margin-top:6px;line-height:1.35;}
.anchor{font-size:1.35rem;font-weight:800;color:var(--teal);margin-top:8px;}
.big-emoji{font-size:4rem;line-height:1;margin-top:4px;}
.big-meaning{font-size:1rem;font-weight:700;color:var(--sub);margin-top:4px;}
.hear-btn{margin-top:16px;background:var(--teal);color:#fff;border:none;border-radius:999px;
  padding:13px 28px;font-family:"Baloo 2",cursive;font-size:1.05rem;font-weight:800;cursor:pointer;
  box-shadow:0 5px 0 var(--teal-dark);}
.hear-btn:active{transform:translateY(3px);box-shadow:0 2px 0 var(--teal-dark);}
.say-btn{margin-top:12px;background:var(--coral);color:#fff;border:none;border-radius:999px;
  padding:13px 28px;font-family:"Baloo 2",cursive;font-size:1.05rem;font-weight:800;cursor:pointer;
  box-shadow:0 5px 0 #C74936;display:inline-block;}
.say-btn:active{transform:translateY(3px);box-shadow:0 2px 0 #C74936;}
.say-feedback{margin-top:12px;font-weight:800;font-size:1rem;min-height:26px;}
.repeat-banner{margin-top:16px;background:var(--mango-soft);border:3px dashed var(--mango);
  border-radius:18px;padding:14px 20px;font-family:"Baloo 2",cursive;font-size:1.15rem;
  font-weight:800;color:var(--mango-dark);animation:pulse 1.2s infinite;}
.next-btn{margin-top:24px;background:var(--leaf);color:#fff;border:none;border-radius:999px;
  padding:15px 44px;font-family:"Baloo 2",cursive;font-size:1.2rem;font-weight:800;cursor:pointer;
  box-shadow:0 6px 0 #3E7A28;}
.next-btn:active{transform:translateY(3px);box-shadow:0 3px 0 #3E7A28;}

.quiz-question{font-family:"Baloo 2",cursive;font-size:1.3rem;font-weight:800;color:var(--ink);margin-bottom:18px;max-width:560px;line-height:1.45;}
.quiz-options{display:flex;gap:16px;flex-wrap:wrap;justify-content:center;max-width:680px;}
.opt-btn{background:#fff;border:4px solid #EADFC8;border-radius:22px;cursor:pointer;
  width:150px;padding:18px 10px;font-family:"Nunito",sans-serif;transition:transform 0.1s;}
.opt-btn.wide{width:280px;padding:16px;}
.opt-btn:hover{transform:translateY(-4px);border-color:var(--mango);}
.opt-btn .o-letter{font-family:"Baloo 2",cursive;font-size:3rem;font-weight:800;color:var(--grape);}
.opt-btn .o-emoji{font-size:2.8rem;}
.opt-btn .o-word{font-weight:800;font-size:1.15rem;margin-top:6px;color:var(--sun);}
.opt-btn .o-small{font-weight:700;font-size:0.8rem;color:var(--sub);margin-top:2px;}
.opt-btn.right{border-color:var(--leaf);background:var(--leaf-soft);}
.opt-btn.wrong{border-color:var(--coral);background:#FFE9E5;animation:shake 0.4s;}
@keyframes shake{0%,100%{transform:translateX(0);}25%{transform:translateX(-7px);}75%{transform:translateX(7px);}}

/* sentence karaoke */
.sentence-box{background:#fff;border-radius:26px;padding:30px 26px;max-width:520px;width:100%;
  box-shadow:0 10px 0 #EADFC8;}
.sentence-line{font-family:"Baloo 2",cursive;font-size:2rem;font-weight:800;line-height:1.6;color:var(--ink);}
.sentence-line .w{padding:2px 6px;border-radius:10px;transition:background 0.15s,color 0.15s;display:inline-block;}
.sentence-line .w.lit{background:var(--mango);color:#fff;}
.sent-emoji{font-size:3.6rem;margin-bottom:6px;}
.sent-mean{font-size:0.95rem;font-weight:700;color:var(--sub);margin-top:8px;}

.result-stars{font-size:4rem;letter-spacing:8px;margin:10px 0;}
.result-title{font-family:"Baloo 2",cursive;font-size:1.85rem;font-weight:800;color:var(--grape);}
.result-sub{font-weight:700;color:var(--sub);margin-top:6px;font-size:1.05rem;}
.confetti-piece{position:fixed;top:-30px;font-size:1.6rem;z-index:200;animation:fall linear forwards;pointer-events:none;}
@keyframes fall{to{transform:translateY(110vh) rotate(540deg);opacity:0.6;}}

@media (max-width:600px){
  .brand h1{font-size:0.9rem;}
  .pill{padding:5px 10px;font-size:0.8rem;}
  .opt-btn{width:120px;}
  .opt-btn.wide{width:100%;}
  .giant-letter{font-size:4.8rem;}
  .blend-line{font-size:1.8rem;}
  .sentence-line{font-size:1.5rem;}
}
@media (prefers-reduced-motion: reduce){
  .node.current,.mascot,.repeat-banner{animation:none;}
}

/* ── scene (picture-book) lessons ── */
.scene-card{max-width:720px;margin:0 auto;text-align:center;}
.scene-frame{width:min(88vw,560px);margin:0 auto 14px;border-radius:26px;overflow:hidden;
  box-shadow:0 10px 0 #EADFC8, 0 14px 30px rgba(0,0,0,0.12);background:#fff;}
.scene-frame img{width:100%;display:block;transform-origin:center;
  animation:kenburns 9s ease-out forwards;}
@keyframes kenburns{from{transform:scale(1);}to{transform:scale(1.1);}}
.scene-word{font-family:"Baloo 2",cursive;font-weight:800;font-size:3.2rem;color:var(--sun);
  line-height:1;margin:4px 0 8px;animation:popIn 0.6s cubic-bezier(0.3,1.6,0.5,1) both;}
@keyframes popIn{0%{transform:scale(0);opacity:0;}70%{transform:scale(1.18);}100%{transform:scale(1);opacity:1;}}
.scene-sentence{font-size:1.45rem;font-weight:800;color:var(--ink);margin-bottom:14px;min-height:2rem;}
.scene-sentence .sw{opacity:0;display:inline-block;transform:translateY(10px);
  transition:opacity 0.28s,transform 0.28s;margin-right:0.32em;}
.scene-sentence .sw.show{opacity:1;transform:none;}
.scene-sentence .sw.key{color:var(--sun);font-family:"Baloo 2",cursive;font-size:1.7rem;}
.tamil-btn{background:var(--grape,#8E5BD1);box-shadow:0 5px 0 #6B3FA8;}
.tamil-btn:active{transform:translateY(3px);box-shadow:0 2px 0 #6B3FA8;}
.opt-btn.scene-opt{width:180px;padding:10px;}
.opt-btn.scene-opt img{width:100%;border-radius:14px;display:block;}
.lesson-body>.scene-card, .lesson-body>.big-card, .lesson-body>.sentence-box,
.lesson-body>.quiz-question{animation:pageIn 0.45s ease-out both;}
@keyframes pageIn{from{opacity:0;transform:translateX(46px);}to{opacity:1;transform:none;}}
@media (max-width:600px){
  .scene-word{font-size:2.4rem;}
  .scene-sentence{font-size:1.15rem;}
  .opt-btn.scene-opt{width:130px;}
}
</style>
</head>
<body>

<div class="topbar">
  <div class="brand">
    <span class="icon">🎒</span>
    <h1>DigiKids — Senior KG · English<small id="tb-school">Global Language Master</small></h1>
  </div>
  <div class="top-stats">
    <div class="pill" title="Days practiced in a row">🔥 <span id="streak-count">0</span></div>
    <div class="pill" title="Reading stars earned">⭐ <span id="star-count">0</span></div>
    <button class="pill mode-toggle" id="mode-btn" onclick="toggleMode()" title="Class mode (projector) or My mode (headset)">🏫 Class Mode</button>
    <a class="home-link" href="kg.html">🐘 Islands</a>
  </div>
</div>

<div class="journey-wrap" id="journey"></div>

<div class="lesson-modal" id="lesson-modal">
  <div class="lesson-top">
    <button class="close-btn" onclick="closeLesson()" title="Close lesson">✕</button>
    <div class="progress-track"><div class="progress-fill" id="prog-fill"></div></div>
  </div>
  <div class="lesson-body" id="lesson-body"></div>
</div>

<script>
'use strict';

/* ── school login guard ── */
var SCHOOL=null;
try{ SCHOOL=JSON.parse(localStorage.getItem('glm_school')||'null'); }catch(e){}
if(!SCHOOL || !SCHOOL.code){ location.href='index.html'; }
else if(!SCHOOL.has_kg){ location.href='kg.html'; }

/* ════════════════ READING CONTENT ════════════════
   Item fields: h = what is shown big, spk = what the voice says,
   anchor = helper word, m = meaning, e = picture, node = circle face */
var STAGES=[

  /* ───── CHAPTER 1 · POSITION WORDS (Book Unit 6) ───── */
  { id:'u1', emoji:'📦', name:'Chapter 1 · Position Words', sub:'Where is it? In, on, under, near, far!', type:'scene',
    lessons:[
      {id:'u1l1', node:'📦', label:'In · On · Under · Out', items:[
        {h:'IN',    spk:'In! The ball is IN the box.',        q:'In. The ball is in the box',        anchor:'The ball is IN the box.',      m:'', e:'⚽📦', img:'assets/kg/pos-in.webp', ta:'Ball எங்க இருக்கு? Ball, box-க்கு உள்ள இருக்கு. அத English-ல எப்படி சொல்லணும்?'},
        {h:'ON',    spk:'On! The cat is ON the chair.',       q:'On. The cat is on the chair',       anchor:'The cat is ON the chair.',     m:'', e:'🐱🪑', img:'assets/kg/pos-on.webp', ta:'Cat எங்க இருக்கு? Cat, chair மேல உட்கார்ந்திருக்கு. அத English-ல எப்படி சொல்லணும்?'},
        {h:'UNDER', spk:'Under! The dog is UNDER the bed.',   q:'Under. The dog is under the bed',   anchor:'The dog is UNDER the bed.',    m:'', e:'🛏️🐶', img:'assets/kg/pos-under.webp', ta:'நாய்க்குட்டி எங்க இருக்கு? அது கட்டில் கீழ இருக்கு. அத English-ல எப்படி சொல்லணும்?'},
        {h:'OUT',   spk:'Out! The chick is OUT of the box.',  q:'Out. The chick is out of the box',  anchor:'The chick is OUT of the box.', m:'', e:'🐥📦', img:'assets/kg/pos-out.webp', ta:'குஞ்சு எங்க இருக்கு? அது box-க்கு வெளியே இருக்கு. அத English-ல எப்படி சொல்லணும்?'}
      ]},
      {id:'u1l2', node:'🐱', label:'Near · Far · Beside · Between', items:[
        {h:'NEAR',    spk:'Near! The cat is NEAR the box.',           q:'Near. The cat is near the box',           anchor:'The cat is NEAR the box.',        m:'', e:'🐱📦', img:'assets/kg/pos-near.webp', ta:'Cat எங்க இருக்கு? Cat, box பக்கத்துல இருக்கு. அத English-ல எப்படி சொல்லணும்?'},
        {h:'FAR',     spk:'Far! The mountain is FAR away.',           q:'Far. The mountain is far away',           anchor:'The mountain is FAR away.',       m:'', e:'🧍⛰️', img:'assets/kg/pos-far.webp', ta:'மலை எங்க இருக்கு? மலை ரொம்ப தூரத்துல இருக்கு. அத English-ல எப்படி சொல்லணும்?'},
        {h:'BESIDE',  spk:'Beside! The girl is BESIDE the boy.',      q:'Beside. The girl is beside the boy',      anchor:'The girl is BESIDE the boy.',     m:'', e:'👧👦', img:'assets/kg/pos-beside.webp', ta:'பொண்ணு எங்க நிக்கிறா? பையன் பக்கத்துலயே நிக்கிறா. அத English-ல எப்படி சொல்லணும்?'},
        {h:'BETWEEN', spk:'Between! The girl is BETWEEN two trees.',  q:'Between. The girl is between two trees',  anchor:'The girl is BETWEEN two trees.',  m:'', e:'🌳👧🌳', img:'assets/kg/pos-between.webp', ta:'பொண்ணு எங்க நிக்கிறா? ரெண்டு மரத்துக்கு நடுவுல நிக்கிறா. அத English-ல எப்படி சொல்லணும்?'}
      ]},
      {id:'u1l3', node:'🎈', label:'Up · Down · Top · Bottom', items:[
        {h:'UP',     spk:'Up! The balloon goes UP in the sky.',              q:'Up. The balloon goes up',                        anchor:'The balloon goes UP in the sky.',        m:'', e:'🎈☁️', img:'assets/kg/pos-up.webp', ta:'Balloon எங்க போகுது? மேல வானத்துக்கு போகுது. அத English-ல எப்படி சொல்லணும்?'},
        {h:'DOWN',   spk:'Down! The leaf falls DOWN.',                       q:'Down. The leaf falls down',                      anchor:'The leaf falls DOWN.',                   m:'', e:'🍃⬇️', img:'assets/kg/pos-down.webp', ta:'இலை என்ன ஆகுது? கீழ விழுது. அத English-ல எப்படி சொல்லணும்?'},
        {h:'TOP',    spk:'Top! The flag is on TOP of the hill.',             q:'Top. The flag is on top of the hill',            anchor:'The flag is on TOP of the hill.',        m:'', e:'🚩⛰️', img:'assets/kg/pos-top.webp', ta:'கொடி எங்க இருக்கு? மலை உச்சியில இருக்கு. அத English-ல எப்படி சொல்லணும்?'},
        {h:'BOTTOM', spk:'Bottom! The anchor is at the BOTTOM of the sea.',  q:'Bottom. The anchor is at the bottom of the sea', anchor:'The anchor is at the BOTTOM of the sea.',m:'', e:'🌊⚓', img:'assets/kg/pos-bottom.webp', ta:'நங்கூரம் எங்க இருக்கு? கடலோட அடியில இருக்கு. அத English-ல எப்படி சொல்லணும்?'}
      ]},
      {id:'u1l4', node:'✋', label:'Left · Right · Front · Back', items:[
        {h:'LEFT',  spk:'Left! The bird is on the LEFT of the tree.',          q:'Left. The bird is on the left of the tree',          anchor:'The bird is on the LEFT of the tree.',       m:'', e:'🐦🌳', img:'assets/kg/pos-left.webp', ta:'பறவை எங்க இருக்கு? மரத்தோட இடது பக்கம் இருக்கு. அத English-ல எப்படி சொல்லணும்?'},
        {h:'RIGHT', spk:'Right! The butterfly is on the RIGHT of the flower.', q:'Right. The butterfly is on the right of the flower', anchor:'The butterfly is on the RIGHT of the flower.',m:'', e:'🌸🦋', img:'assets/kg/pos-right.webp', ta:'பட்டாம்பூச்சி எங்க இருக்கு? பூவோட வலது பக்கம் இருக்கு. அத English-ல எப்படி சொல்லணும்?'},
        {h:'FRONT', spk:'Front! The boy stands in FRONT of the bus.',          q:'Front. The boy is in front of the bus',              anchor:'The boy stands in FRONT of the bus.',        m:'', e:'👦🚌', img:'assets/kg/pos-front.webp', ta:'பையன் எங்க நிக்கிறான்? Bus-க்கு முன்னாடி நிக்கிறான். அத English-ல எப்படி சொல்லணும்?'},
        {h:'BACK',  spk:'Back! The bag is on his BACK.',                       q:'Back. The bag is on his back',                       anchor:'The bag is on his BACK.',                    m:'', e:'🎒🚶', img:'assets/kg/pos-back.webp', ta:'பை எங்க இருக்கு? அவனோட முதுகுல இருக்கு. அத English-ல எப்படி சொல்லணும்?'}
      ]}
    ]
  },

  /* ───── CHAPTER 2 · OPPOSITES (Book Unit 8) ───── */
  { id:'u2', emoji:'🐘', name:'Chapter 2 · Opposites', sub:'Big and small, hot and cold!', type:'blend',
    lessons:[

/* ════════════════ PROGRESS ════════════════ */
function loadProgress(){
  try{ return JSON.parse(localStorage.getItem('ukge_progress')||'{}'); }catch(e){ return {}; }
}
function saveProgress(p){ try{ localStorage.setItem('ukge_progress',JSON.stringify(p)); }catch(e){} }
function totalStars(){
  var p=loadProgress(),t=0,k;
  for(k in p){ if(p[k] && p[k].stars) t+=p[k].stars; }
  return t;
}
function todayStr(){
  var d=new Date();
  return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
}
function yesterdayStr(){
  var y=new Date(); y.setDate(y.getDate()-1);
  return y.getFullYear()+'-'+String(y.getMonth()+1).padStart(2,'0')+'-'+String(y.getDate()).padStart(2,'0');
}
function bumpStreak(){
  var s;
  try{ s=JSON.parse(localStorage.getItem('glm_streak')||'{}'); }catch(e){ s={}; }
  var today=todayStr();
  if(s.last!==today){
    s.count = (s.last===yesterdayStr()) ? (s.count||0)+1 : 1;
    s.last=today;
    try{ localStorage.setItem('glm_streak',JSON.stringify(s)); }catch(e){}
  }
  return s.count||0;
}
function currentStreak(){
  var s;
  try{ s=JSON.parse(localStorage.getItem('glm_streak')||'{}'); }catch(e){ s={}; }
  if(!s.last) return 0;
  return (s.last===todayStr()||s.last===yesterdayStr()) ? (s.count||0) : 0;
}

/* ════════════════ ENGLISH VOICE ════════════════ */
var enVoice=null;
var taVoice=null;
function pickVoice(){
  var vs=window.speechSynthesis ? window.speechSynthesis.getVoices() : [];
  var i;
  enVoice=null;
  taVoice=null;
  for(i=0;i<vs.length;i++){ if(/ta[-_]IN/i.test(vs[i].lang)){ taVoice=vs[i]; break; } }
  if(!taVoice){ for(i=0;i<vs.length;i++){ if(/^ta/i.test(vs[i].lang)){ taVoice=vs[i]; break; } } }
  for(i=0;i<vs.length;i++){ if(/en[-_]IN/i.test(vs[i].lang)){ enVoice=vs[i]; return; } }
  for(i=0;i<vs.length;i++){ if(/en[-_]GB/i.test(vs[i].lang)){ enVoice=vs[i]; return; } }
  for(i=0;i<vs.length;i++){ if(/^en/i.test(vs[i].lang)){ enVoice=vs[i]; return; } }
}
if(window.speechSynthesis){
  pickVoice();
  window.speechSynthesis.onvoiceschanged=pickVoice;
}
function sayTa(text, cb, slow){
  if(!window.speechSynthesis){ if(cb)cb(); return; }
  window.speechSynthesis.cancel();
  var u=new SpeechSynthesisUtterance(text);
  if(enVoice) u.voice=enVoice;
  u.rate=slow?0.62:0.78; u.pitch=1.05;
  if(cb) u.onend=cb;
  window.speechSynthesis.speak(u);
}
function sayTamil(text, cb){
  if(!window.speechSynthesis){ if(cb)cb(); return; }
  window.speechSynthesis.cancel();
  var u=new SpeechSynthesisUtterance(text);
  u.lang='ta-IN';
  if(taVoice) u.voice=taVoice;
  u.rate=0.82; u.pitch=1.05;
  if(cb) u.onend=cb;
  window.speechSynthesis.speak(u);
}

/* ════════════════ UNLOCK RULES ════════════════ */
function stageComplete(si){
  var p=loadProgress();
  return STAGES[si].lessons.every(function(l){ return p[l.id] && p[l.id].stars>0; });
}
function stageUnlocked(si){
  if(si===0) return true;
  return stageComplete(si-1);
}
function lessonUnlocked(si, li){
  if(!stageUnlocked(si)) return false;
  if(li===0) return true;
  var prev=STAGES[si].lessons[li-1];
  var p=loadProgress();
  return !!(p[prev.id] && p[prev.id].stars>0);
}

/* ════════════════ PATH RENDERING ════════════════ */
function renderJourney(){
  var wrap=document.getElementById('journey');
  wrap.innerHTML='';
  var p=loadProgress();
  var mascotPlaced=false;

  STAGES.forEach(function(stage, si){
    var unlockedStage=stageUnlocked(si);
    var banner=document.createElement('div');
    banner.className='stage-banner'+(unlockedStage?'':' locked');
    var subText = unlockedStage ? stage.sub : 'Finish the level above to open this';
    banner.innerHTML='<span class="st-emoji">'+stage.emoji+'</span>'+
      '<div><div class="st-name">'+stage.name+'</div><div class="st-sub">'+subText+'</div></div>';
    wrap.appendChild(banner);

    var block=document.createElement('div');
    block.className='path-block';
    var svg=document.createElementNS('http://www.w3.org/2000/svg','svg');
    svg.setAttribute('class','path-svg');
    var pathEl=document.createElementNS('http://www.w3.org/2000/svg','path');
    svg.appendChild(pathEl);
    block.appendChild(svg);

    var pts=[];
    stage.lessons.forEach(function(lesson, li){
      var row=document.createElement('div');
      row.className='node-row';
      var xPercent = 50 + 32*Math.sin(li*1.1);
      var node=document.createElement('button');
      var unlocked=lessonUnlocked(si,li);
      var done=!!(p[lesson.id] && p[lesson.id].stars>0);
      var cls='node';
      if(!unlocked) cls+=' locked';
      else if(done) cls+=' done';
      else cls+=' current';
      node.className=cls;
      node.style.position='absolute';
      node.style.left='calc('+xPercent+'% - 42px)';
      node.innerHTML=(unlocked?lesson.node:'🔒')+
        '<span class="node-label">'+lesson.label+'</span>'+
        (done?'<span class="stars">'+'⭐'.repeat(p[lesson.id].stars)+'</span>':'');
      if(unlocked){
        node.onclick=(function(s,l){return function(){openLesson(s,l);};})(si,li);
      }else{
        node.onclick=function(){ sayTa('Finish the lesson before this one first!'); };
      }
      if(cls.indexOf('current')>=0 && !mascotPlaced){
        var m=document.createElement('span');
        m.className='mascot'; m.textContent='🐘';
        node.appendChild(m);
        mascotPlaced=true;
      }
      row.appendChild(node);
      block.appendChild(row);
      pts.push({x:xPercent, y:li*112+56});
    });

    wrap.appendChild(block);

    var w=block.clientWidth||520;
    var h=stage.lessons.length*112;
    svg.setAttribute('viewBox','0 0 '+w+' '+h);
    var d='';
    pts.forEach(function(pt,i){
      var px=pt.x/100*w, py=pt.y;
      if(i===0){ d+='M '+px+' '+py; }
      else{
        var prev=pts[i-1];
        var prx=prev.x/100*w, pry=prev.y;
        var midY=(pry+py)/2;
        d+=' C '+prx+' '+midY+', '+px+' '+midY+', '+px+' '+py;
      }
    });
    pathEl.setAttribute('d',d);
  });

  document.getElementById('star-count').textContent=totalStars();
  document.getElementById('streak-count').textContent=currentStreak();
}

/* ════════════════ LETTERS & BLEND — learn ════════════════ */
var sceneTimers=[];
function clearScene(){
  sceneTimers.forEach(function(t){ clearTimeout(t); }); sceneTimers=[];
  if(typeof stopTaAudio==='function') stopTaAudio();
}
function revealSentence(sentence, key){
  clearScene();
  var words=sentence.split(' ');
  var el=document.getElementById('scene-sent');
  if(!el) return;
  el.innerHTML=words.map(function(w,i){
    var isKey = w.replace(/[^A-Za-z]/g,'').toUpperCase()===key.toUpperCase();
    return '<span class="sw'+(isKey?' key':'')+'" id="sw-'+i+'">'+w+'</span>';
  }).join('');
  words.forEach(function(w,i){
    sceneTimers.push(setTimeout(function(){
      var s=document.getElementById('sw-'+i);
      if(s) s.classList.add('show');
    }, 550 + i*420));
  });
}
function showSceneStep(){
  var items=curItems();
  if(L.step>=items.length){ L.phase='quiz'; L.step=0; showItemQuizStep(); return; }
  setProgressBar();
  var it=items[L.step];
  var body=document.getElementById('lesson-body');
  body.innerHTML=
    '<div class="scene-card">'+
      '<div class="scene-frame"><img src="'+it.img+'" alt=""/></div>'+
      '<div class="scene-word">'+it.h+'</div>'+
      '<div class="scene-sentence" id="scene-sent"></div>'+
      '<button class="hear-btn" onclick="hearScene()">🔊 Hear it again</button> '+
      (it.ta ? '<button class="hear-btn tamil-btn" onclick="explainTamil()">🗣️ தமிழில் விளக்கு</button>' : '')+'<br/>'+
      micOrRepeatHtml()+
    '</div>'+
    '<button class="next-btn" onclick="nextSceneStep()">Next ➜</button>';
  revealSentence(it.anchor, it.h);
  sayTa(it.spk||it.h, null, true);
}
function hearScene(){
  var it=curItems()[L.step];
  revealSentence(it.anchor, it.h);
  sayTa(it.spk||it.h, null, true);
}
var taAudio=null;
function stopTaAudio(){
  if(taAudio){ try{ taAudio.pause(); }catch(e){} taAudio=null; }
}
function explainTamil(){
  var it=curItems()[L.step];
  if(!it || !it.ta) return;
  clearScene();
  if(window.speechSynthesis) window.speechSynthesis.cancel();
  var src=it.img.replace('pos-','audio/ta-').replace('.webp','.mp3');
  taAudio=new Audio(src);
  taAudio.onloadedmetadata=function(){
    var d=taAudio.duration||7;
    /* reveal the English sentence as the clip reaches its English part */
    sceneTimers.push(setTimeout(function(){
      revealSentence(it.anchor, it.h);
    }, Math.max(400,(d-3.4)*1000)));
  };
  taAudio.onerror=function(){
    /* audio file missing — fall back to free browser Tamil voice */
    taAudio=null;
    sayTamil(it.ta, function(){
      revealSentence(it.anchor, it.h);
      sayTa(it.spk||it.h, null, true);
    });
  };
  taAudio.play().catch(function(){});
}
function nextSceneStep(){ clearScene(); L.step++; showSceneStep(); }

function showItemStep(){
  if(stageType()==='scene'){ showSceneStep(); return; }
  var items=curItems();
  if(L.step>=items.length){ L.phase='quiz'; L.step=0; showItemQuizStep(); return; }

function listenAndCheck(){
  var fb=document.getElementById('say-fb');
  if(!SR){ if(fb)fb.textContent='Listening not available here.'; return; }
  var it = (L.phase==='learn') ? curItems()[L.step] : null;
  var target = it ? (it.h.indexOf('→')>=0 ? it.h.split('→').pop().trim() : it.h) : '';
  fb.textContent='👂 Listening… say: "'+target+'"';
  fb.style.color='var(--sub)';
  var rec=new SR();
  rec.lang='en-IN'; rec.interimResults=false; rec.maxAlternatives=3;
  var answered=false;
  rec.onresult=function(ev){
    answered=true;
    var heard='';
    try{ heard=ev.results[0][0].transcript; }catch(e){}
    if(heard.indexOf(target)>=0 || target.indexOf(heard)>=0){
      fb.textContent='✅ Super! You read it!';
      fb.style.color='var(--leaf)';
      sayTa('Super!');
    }else{
      fb.textContent='Good try! I heard "'+heard+'" — try once more!';
      fb.style.color='var(--coral)';
    }
  };
  rec.onerror=function(){ if(!answered){ fb.textContent='Could not hear. Check the mic!'; fb.style.color='var(--coral)'; } };
  rec.onend=function(){ if(!answered && fb.textContent.indexOf('Listening')>=0){ fb.textContent='Could not hear — try again!'; fb.style.color='var(--coral)'; } };
  try{ rec.start(); }catch(e){ fb.textContent='Mic is busy. Try again.'; }
}

/* ════════════════ LETTERS & BLEND — quiz ════════════════ */
function shuffle(arr){
  for(var i=arr.length-1;i>0;i--){ var j=Math.floor(Math.random()*(i+1)); var t=arr[i];arr[i]=arr[j];arr[j]=t; }
  return arr;
}
function quizFace(it){
  /* what is shown on an option button + what must be tapped */
  if(stageType()==='scene') return {big:'', word:'', emoji:'', img:it.img};
  if(stageType()==='blend') return {big:'', word:it.h, emoji:it.e};
  var shown = it.h.indexOf('→')>=0 ? it.h.split('→').pop().trim() : it.h;
  return {big:shown, word:'', emoji:''};
}
function quizAudio(it){
  if(it.q) return it.q;
  if(stageType()==='blend') return it.h;
  return it.h.indexOf('→')>=0 ? it.h.split('→').pop().trim() : it.h;
}
function buildItemQuiz(si,li){
  var items=STAGES[si].lessons[li].items.slice();
  var qs=shuffle(items.map(function(w){ return {answer:w}; }));
  qs.forEach(function(q){
    var pool=shuffle(items.filter(function(w){ return w.h!==q.answer.h; }));
    q.options=shuffle([q.answer,pool[0],pool[1]]);
  });
  return qs;
}
function showItemQuizStep(){
  if(L.step>=L.quiz.length){ showResult(); return; }
  setProgressBar();
  var q=L.quiz[L.step];
  var isBlend=stageType()==='blend';
  var body=document.getElementById('lesson-body');
  var isScene=stageType()==='scene';
  var optsHtml=q.options.map(function(o,i){
    var f=quizFace(o);
    return '<button class="opt-btn'+(isBlend?' wide':'')+(isScene?' scene-opt':'')+'" id="opt-'+i+'" onclick="pickItemOption('+i+')">'+
      (f.img?'<img src="'+f.img+'" alt=""/>':'')+
      (f.emoji?'<div class="o-emoji">'+f.emoji+'</div>':'')+
      (f.big?'<div class="o-letter">'+f.big+'</div>':'')+
      (f.word?'<div class="o-word">'+f.word+'</div>':'')+
      '</button>';
  }).join('');
  body.innerHTML=
    '<div class="quiz-question">👂 Listen… then tap the right one!<br/><span style="font-size:0.9rem;color:var(--sub);">Listen, then tap the right one!</span></div>'+
    '<button class="hear-btn" style="margin-bottom:22px;" onclick="sayItemQuiz()">🔊 Hear it again</button>'+
    '<div class="quiz-options">'+optsHtml+'</div>';
  sayItemQuiz();
}
function sayItemQuiz(){ sayTa(quizAudio(L.quiz[L.step].answer), null, true); }
function pickItemOption(i){
  var q=L.quiz[L.step];
  var chosen=q.options[i];
  var btn=document.getElementById('opt-'+i);
  var all=document.querySelectorAll('.opt-btn');
  for(var k=0;k<all.length;k++){ all[k].onclick=null; }
  if(chosen.h===q.answer.h){
    btn.classList.add('right'); L.score++; sayTa('Correct!');
  }else{
    btn.classList.add('wrong');
    q.options.forEach(function(o,idx){
      if(o.h===q.answer.h) document.getElementById('opt-'+idx).classList.add('right');
    });
    sayTa('The answer is: '+quizAudio(q.answer));
  }
  setTimeout(function(){ L.step++; showItemQuizStep(); },1500);
}

function showReadStep(){
  var items=curItems();

  setProgressBar();
  var it=items[L.step];
  var words=it.h.split(' ');
  var spans=words.map(function(w,i){ return '<span class="w" id="kw-'+i+'">'+w+'</span>'; }).join(' ');
  var body=document.getElementById('lesson-body');
  body.innerHTML=
    '<div class="sentence-box">'+
      '<div class="sent-emoji">'+it.e+'</div>'+
      '<div class="sentence-line" id="kline">'+spans+'</div>'+
      '<div class="sent-mean">'+it.m+'</div>'+
      '<button class="hear-btn" onclick="playKaraoke()">🔊 Watch me read!</button><br/>'+
      micOrRepeatHtml()+
    '</div>'+
    '<button class="next-btn" onclick="nextReadStep()">I read it! ➜</button>';
  playKaraoke();
}
function playKaraoke(){
  clearKaraoke();
  var it=curItems()[L.step];
  var words=it.h.split(' ');
  var totalChars=it.h.length;
  var per=Math.max(500, Math.round(3600/words.length)); /* rough per-word time at slow rate */
  var elapsed=200;
  words.forEach(function(w,i){
    var dur=Math.max(450, Math.round(w.length/totalChars*3600));
    karaokeTimers.push(setTimeout(function(){
      for(var k=0;k<words.length;k++){
        var el=document.getElementById('kw-'+k);
        if(el) el.classList.toggle('lit', k===i);
      }
    }, elapsed));
    elapsed+=dur;
  });
  karaokeTimers.push(setTimeout(function(){
    for(var k=0;k<words.length;k++){
      var el=document.getElementById('kw-'+k);
      if(el) el.classList.remove('lit');
    }
  }, elapsed+300));
  sayTa(it.h, null, true);
}
function nextReadStep(){ clearKaraoke(); L.step++; showReadStep(); }

/* comprehension quiz: hear/see sentence → tap the matching picture */
function buildReadQuiz(si,li){
  var items=STAGES[si].lessons[li].items.slice();
  var qs=shuffle(items.map(function(w){ return {answer:w}; }));
  qs.forEach(function(q){
    var pool=shuffle(items.filter(function(w){ return w.h!==q.answer.h; }));
    q.options=shuffle([q.answer,pool[0],pool[1]]);
  });
  return qs;
}
function showReadQuizStep(){
  if(L.step>=L.quiz.length){ showResult(); return; }
  setProgressBar();
  var q=L.quiz[L.step];
  var body=document.getElementById('lesson-body');
  var optsHtml=q.options.map(function(o,i){
    return '<button class="opt-btn" id="opt-'+i+'" onclick="pickReadOption('+i+')">'+
      '<div class="o-emoji" style="font-size:3.4rem;">'+o.e+'</div></button>';
  }).join('');
  body.innerHTML=
    '<div class="quiz-question">Read this: <br/><span style="color:var(--grape);font-size:1.6rem;">“'+q.answer.h+'”</span><br/>'+
    '<span style="font-size:0.9rem;color:var(--sub);">Read it, then tap the right picture!</span></div>'+
    '<button class="hear-btn" style="margin-bottom:20px;" onclick="sayReadQuiz()">🔊 Need a hint? Listen</button>'+
    '<div class="quiz-options">'+optsHtml+'</div>';
}
function sayReadQuiz(){ sayTa(L.quiz[L.step].answer.h, null, true); }
function pickReadOption(i){
  var q=L.quiz[L.step];
  var chosen=q.options[i];
  var btn=document.getElementById('opt-'+i);
  var all=document.querySelectorAll('.opt-btn');
  for(var k=0;k<all.length;k++){ all[k].onclick=null; }
  if(chosen.h===q.answer.h){
    btn.classList.add('right'); L.score++; sayTa('Correct! You read it!');
  }else{
    btn.classList.add('wrong');
    q.options.forEach(function(o,idx){
      if(o.h===q.answer.h) document.getElementById('opt-'+idx).classList.add('right');
    });
    sayTa('The sentence says: '+q.answer.h);
  }
  setTimeout(function(){ L.step++; showReadQuizStep(); },1600);
}

/* ════════════════ RESULT ════════════════ */
function showResult(){
  document.getElementById('prog-fill').style.width='100%';
  var total=L.quiz.length||1;
  var ratio=L.score/total;
  var stars = ratio>=0.99?3 : ratio>=0.75?2 : ratio>=0.5?1 : 0;
  var body=document.getElementById('lesson-body');
  var lesson=curLesson();

  if(stars>0){
    var p=loadProgress();
    var old=(p[lesson.id]&&p[lesson.id].stars)||0;
    if(stars>old){ p[lesson.id]={stars:stars}; saveProgress(p); }
    bumpStreak();
    confettiBurst();
    body.innerHTML=
      '<div class="result-title">🎉 Super! You are reading!</div>'+
      '<div class="result-stars">'+'⭐'.repeat(stars)+'<span style="opacity:0.25;">'+'⭐'.repeat(3-stars)+'</span></div>'+
      '<div class="result-sub">'+total+' — you got '+L.score+' right!</div>'+
      '<button class="next-btn" onclick="closeLesson()">Back to my path ➜</button>';
    sayTa('Super! You earned '+stars+(stars===1?' star!':' stars!'));
  }else{
    body.innerHTML=
      '<div class="result-title">💪 Good try!</div>'+
      '<div class="result-sub">'+total+' — '+L.score+' right. One more time!</div>'+
      '<button class="next-btn" onclick="retryLesson()">Try again ➜</button>'+
      '<br/><button class="hear-btn" style="margin-top:14px;" onclick="closeLesson()">Back to my path</button>';
    sayTa('Good try! Let us read once more.');
  }
}
function retryLesson(){ openLesson(L.stage,L.lesson); }

function confettiBurst(){
  var emojis=['🎉','⭐','🎊','✨','📗','🔤'];
  for(var i=0;i<24;i++){
    var el=document.createElement('div');
    el.className='confetti-piece';
    el.textContent=emojis[Math.floor(Math.random()*emojis.length)];
    el.style.left=Math.random()*100+'vw';
    el.style.animationDuration=(2+Math.random()*2)+'s';
    document.body.appendChild(el);
    setTimeout(function(node){ return function(){ node.remove(); }; }(el), 4500);
  }
}
