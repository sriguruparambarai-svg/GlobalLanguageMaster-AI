<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>School Login — Global Language Master</title>
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@600;700;800&family=Nunito:wght@600;700;800&display=swap" rel="stylesheet"/>
<style>
:root{--teal:#0E7C7B;--teal-dark:#095C5B;--mango:#FFB627;--mango-dark:#E89B00;
  --cream:#FFF9EF;--ink:#27323A;--sub:#5F7078;--coral:#FF6B57;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:"Nunito",sans-serif;background:linear-gradient(160deg,var(--teal) 0%,var(--teal-dark) 60%);
  min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;}
.card{background:var(--cream);border-radius:26px;padding:38px 34px;max-width:420px;width:100%;
  box-shadow:0 16px 50px rgba(0,0,0,0.3);text-align:center;}
.peacock{font-size:3.6rem;}
h1{font-family:"Baloo 2",cursive;font-size:1.6rem;font-weight:800;color:var(--teal);margin-top:6px;}
.tag{font-size:0.85rem;font-weight:700;color:var(--sub);margin-bottom:24px;}
label{display:block;text-align:left;font-weight:800;font-size:0.85rem;color:var(--ink);margin:14px 0 6px;}
input{width:100%;border:3px solid #EADFC8;border-radius:14px;padding:13px 16px;font-size:1.05rem;
  font-family:"Nunito",sans-serif;font-weight:700;outline:none;background:#fff;}
input:focus{border-color:var(--teal);}
.login-btn{width:100%;margin-top:22px;background:var(--mango);color:var(--ink);border:none;border-radius:999px;
  padding:15px;font-family:"Baloo 2",cursive;font-size:1.2rem;font-weight:800;cursor:pointer;
  box-shadow:0 5px 0 var(--mango-dark);}
.login-btn:active{transform:translateY(3px);box-shadow:0 2px 0 var(--mango-dark);}
.err{margin-top:14px;font-weight:800;color:var(--coral);min-height:22px;font-size:0.9rem;}
.foot{margin-top:20px;font-size:0.75rem;color:var(--sub);font-weight:700;}
</style>
</head>
<body>
<div class="card">
  <div class="peacock">🦚</div>
  <h1>Global Language Master</h1>
  <div class="tag">Spoken English &amp; Hindi for Schools</div>

  <label>School Code</label>
  <input id="code" placeholder="e.g. ARK2024" autocomplete="off"/>

  <label>Password</label>
  <input id="pass" type="password" placeholder="School password" onkeydown="if(event.key==='Enter')doLogin()"/>

  <button class="login-btn" onclick="doLogin()">Enter My School ➜</button>
  <div class="err" id="err"></div>

  <div class="foot">A DigiSmartSchool product · Contact us to subscribe</div>
</div>

<script>
'use strict';
// already logged in? go straight to home
try{
  var s=JSON.parse(localStorage.getItem('glm_school')||'null');
  if(s && s.code){ location.href='home.html'; }
}catch(e){}

async function doLogin(){
  var code=document.getElementById('code').value.trim();
  var pass=document.getElementById('pass').value.trim();
  var err=document.getElementById('err');
  err.textContent='';
  if(!code||!pass){ err.textContent='Please enter school code and password.'; return; }
  err.style.color='var(--sub)';
  err.textContent='Checking…';
  try{
    var r=await fetch('/api/auth',{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({action:'school_login',code:code,password:pass})});
    var d=await r.json();
    if(d.ok && d.school){
      localStorage.setItem('glm_school',JSON.stringify(d.school));
      location.href='home.html';
    }else{
      err.style.color='var(--coral)';
      err.textContent=d.error||'Login failed. Please try again.';
    }
  }catch(e){
    err.style.color='var(--coral)';
    err.textContent='Could not reach the server. Check internet and try again.';
  }
}
</script>
</body>
</html>
