<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>My English Journey — Global Language Master</title>
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;600;700;800&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet"/>
<style>
:root{
  --teal:#0E7C7B; --teal-dark:#095C5B; --teal-soft:#DFF3F2;
  --mango:#FFB627; --mango-dark:#E89B00; --mango-soft:#FFF3D6;
  --leaf:#57A639; --leaf-soft:#E9F5E1;
  --coral:#FF6B57;
  --cream:#FFF9EF; --ink:#27323A; --sub:#5F7078;
  --locked:#C9D2D6; --locked-soft:#EEF2F4;
}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;}
body{font-family:"Nunito",sans-serif;background:var(--cream);color:var(--ink);}

/* ── TOP BAR ── */
.topbar{position:sticky;top:0;z-index:50;background:var(--teal);color:#fff;
  display:flex;align-items:center;gap:14px;padding:12px 18px;
  box-shadow:0 4px 18px rgba(14,124,123,0.35);}
.brand{display:flex;align-items:center;gap:10px;}
.brand .peacock{font-size:2rem;}
.brand h1{font-family:"Baloo 2",cursive;font-size:1.25rem;font-weight:800;line-height:1.1;}
.brand small{display:block;font-family:"Nunito",sans-serif;font-weight:600;font-size:0.7rem;opacity:0.85;}
.top-stats{margin-left:auto;display:flex;align-items:center;gap:10px;flex-wrap:wrap;}
.pill{background:rgba(255,255,255,0.16);border:1px solid rgba(255,255,255,0.28);
  border-radius:999px;padding:6px 14px;font-weight:800;font-size:0.9rem;display:flex;gap:6px;align-items:center;}
.mode-toggle{cursor:pointer;user-select:none;background:var(--mango);color:var(--ink);border:none;}
.mode-toggle:hover{background:var(--mango-dark);color:#fff;}
.practice-link{color:#fff;text-decoration:none;font-weight:800;font-size:0.85rem;
  border-bottom:2px dashed rgba(255,255,255,0.5);padding-bottom:1px;}
.practice-link:hover{border-bottom-style:solid;}

/* ── PATH AREA ── */
.journey-wrap{max-width:560px;margin:0 auto;padding:26px 16px 90px;position:relative;}
.stage-banner{background:var(--teal);color:#fff;border-radius:18px;padding:14px 20px;
  margin:34px 0 10px;display:flex;align-items:center;gap:12px;
  box-shadow:0 6px 0 var(--teal-dark);}
.stage-banner.locked{background:var(--locked);box-shadow:0 6px 0 #AEB9BE;color:#5F7078;}
.stage-banner .st-emoji{font-size:1.9rem;}
.stage-banner .st-name{font-family:"Baloo 2",cursive;font-size:1.15rem;font-weight:800;}
.stage-banner .st-sub{font-size:0.78rem;font-weight:700;opacity:0.9;}

.path-block{position:relative;}
.path-svg{position:absolute;inset:0;width:100%;height:100%;pointer-events:none;}
.path-svg path{fill:none;stroke:var(--mango);stroke-width:7;stroke-linecap:round;
  stroke-dasharray:1 18;}
.node-row{position:relative;height:112px;display:flex;align-items:center;}

.node{position:relative;width:84px;height:84px;border-radius:50%;border:none;cursor:pointer;
  font-size:2rem;display:flex;align-items:center;justify-content:center;
  background:var(--leaf);box-shadow:0 7px 0 #3E7A28;transition:transform 0.12s;}
.node:active{transform:translateY(4px);box-shadow:0 3px 0 #3E7A28;}
.node .node-label{position:absolute;top:100%;margin-top:12px;left:50%;transform:translateX(-50%);
  white-space:nowrap;font-weight:800;font-size:0.8rem;color:var(--ink);
  background:#fff;border-radius:999px;padding:3px 12px;box-shadow:0 2px 8px rgba(0,0,0,0.1);}
.node .stars{position:absolute;top:-16px;left:50%;transform:translateX(-50%);
  font-size:0.85rem;white-space:nowrap;text-shadow:0 1px 2px rgba(0,0,0,0.25);}
.node.current{background:var(--mango);box-shadow:0 7px 0 var(--mango-dark);animation:pulse 1.6s infinite;}
.node.current:active{box-shadow:0 3px 0 var(--mango-dark);}
.node.locked{background:var(--locked);box-shadow:0 7px 0 #AEB9BE;cursor:not-allowed;filter:grayscale(0.4);}
.node.done{background:var(--leaf);}
@keyframes pulse{0%,100%{transform:scale(1);}50%{transform:scale(1.07);}}
.mascot{position:absolute;font-size:2.2rem;top:-46px;left:50%;transform:translateX(-50%);
  animation:bob 1.4s ease-in-out infinite;pointer-events:none;}
@keyframes bob{0%,100%{transform:translateX(-50%) translateY(0);}50%{transform:translateX(-50%) translateY(-8px);}}

/* ── LESSON MODAL ── */
.lesson-modal{position:fixed;inset:0;background:var(--cream);z-index:100;display:none;
  flex-direction:column;overflow-y:auto;}
.lesson-modal.open{display:flex;}
.lesson-top{display:flex;align-items:center;gap:14px;padding:14px 18px;}
.close-btn{background:none;border:none;font-size:1.7rem;cursor:pointer;color:var(--sub);font-weight:800;}
.progress-track{flex:1;height:16px;background:#EADFC8;border-radius:999px;overflow:hidden;}
.progress-fill{height:100%;width:0%;background:var(--leaf);border-radius:999px;transition:width 0.35s;}
.lesson-body{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:16px 20px 30px;text-align:center;}

.big-card{background:#fff;border-radius:26px;padding:34px 30px;max-width:480px;width:100%;
  box-shadow:0 10px 0 #EADFC8;}
.big-emoji{font-size:6rem;line-height:1;}
.big-word{font-family:"Baloo 2",cursive;font-size:2.2rem;font-weight:800;color:var(--teal);margin-top:8px;line-height:1.25;}
.big-sentence{font-size:1.15rem;font-weight:700;color:var(--sub);margin-top:6px;}
.qa-q{font-family:"Baloo 2",cursive;font-size:1.5rem;font-weight:800;color:var(--coral);}
.qa-a{font-family:"Baloo 2",cursive;font-size:1.8rem;font-weight:800;color:var(--teal);margin-top:14px;}
.qa-tag{display:inline-block;font-size:0.75rem;font-weight:800;letter-spacing:1px;
  color:#fff;border-radius:999px;padding:3px 12px;margin-bottom:6px;}
.hear-btn{margin-top:18px;background:var(--teal);color:#fff;border:none;border-radius:999px;
  padding:13px 30px;font-family:"Baloo 2",cursive;font-size:1.15rem;font-weight:800;cursor:pointer;
  box-shadow:0 5px 0 var(--teal-dark);}
.hear-btn:active{transform:translateY(3px);box-shadow:0 2px 0 var(--teal-dark);}
.say-btn{margin-top:12px;background:var(--coral);color:#fff;border:none;border-radius:999px;
  padding:13px 30px;font-family:"Baloo 2",cursive;font-size:1.15rem;font-weight:800;cursor:pointer;
  box-shadow:0 5px 0 #C74936;display:inline-block;}
.say-btn:active{transform:translateY(3px);box-shadow:0 2px 0 #C74936;}
.say-feedback{margin-top:12px;font-weight:800;font-size:1.05rem;min-height:26px;}
.repeat-banner{margin-top:16px;background:var(--mango-soft);border:3px dashed var(--mango);
  border-radius:18px;padding:14px 20px;font-family:"Baloo 2",cursive;font-size:1.3rem;
  font-weight:800;color:var(--mango-dark);animation:pulse 1.2s infinite;}
.next-btn{margin-top:26px;background:var(--leaf);color:#fff;border:none;border-radius:999px;
  padding:15px 46px;font-family:"Baloo 2",cursive;font-size:1.3rem;font-weight:800;cursor:pointer;
  box-shadow:0 6px 0 #3E7A28;}
.next-btn:active{transform:translateY(3px);box-shadow:0 3px 0 #3E7A28;}

/* quiz */
.quiz-question{font-family:"Baloo 2",cursive;font-size:1.5rem;font-weight:800;color:var(--ink);margin-bottom:20px;max-width:560px;}
.quiz-options{display:flex;gap:16px;flex-wrap:wrap;justify-content:center;max-width:640px;}
.opt-btn{background:#fff;border:4px solid #EADFC8;border-radius:22px;cursor:pointer;
  width:150px;padding:20px 10px;font-family:"Nunito",sans-serif;transition:transform 0.1s;}
.opt-btn.wide{width:280px;padding:18px 16px;}
.opt-btn:hover{transform:translateY(-4px);border-color:var(--mango);}
.opt-btn .o-emoji{font-size:3rem;}
.opt-btn .o-word{font-weight:800;font-size:1.05rem;margin-top:6px;color:var(--ink);}
.opt-btn.right{border-color:var(--leaf);background:var(--leaf-soft);}
.opt-btn.wrong{border-color:var(--coral);background:#FFE9E5;animation:shake 0.4s;}
@keyframes shake{0%,100%{transform:translateX(0);}25%{transform:translateX(-7px);}75%{transform:translateX(7px);}}

/* dialogue */
.dialog-box{max-width:520px;width:100%;display:flex;flex-direction:column;gap:12px;margin-bottom:8px;}
.d-line{max-width:85%;padding:12px 18px;border-radius:18px;font-weight:700;font-size:1.05rem;text-align:left;}
.d-line.a{background:#fff;box-shadow:0 4px 0 #EADFC8;align-self:flex-start;border-bottom-left-radius:4px;}
.d-line.b{background:var(--teal);color:#fff;align-self:flex-end;border-bottom-right-radius:4px;box-shadow:0 4px 0 var(--teal-dark);}
.d-who{font-size:0.72rem;font-weight:800;opacity:0.7;letter-spacing:0.5px;margin-bottom:2px;}
.your-turn{background:var(--mango-soft);border:3px dashed var(--mango);border-radius:18px;
  padding:14px 20px;max-width:520px;width:100%;}
.your-turn .yt-label{font-size:0.8rem;font-weight:800;color:var(--mango-dark);letter-spacing:1px;}
.your-turn .yt-line{font-family:"Baloo 2",cursive;font-size:1.35rem;font-weight:800;color:var(--ink);margin-top:4px;}

/* chat (Stage 5) */
.chat-wrap{max-width:560px;width:100%;display:flex;flex-direction:column;height:100%;flex:1;}
.chat-msgs{flex:1;overflow-y:auto;display:flex;flex-direction:column;gap:12px;padding:6px 2px 14px;min-height:220px;}
.c-msg{max-width:85%;padding:12px 16px;border-radius:18px;font-weight:700;font-size:1.02rem;text-align:left;}
.c-msg.ai{background:#fff;box-shadow:0 4px 0 #EADFC8;align-self:flex-start;border-bottom-left-radius:4px;}
.c-msg.me{background:var(--teal);color:#fff;align-self:flex-end;border-bottom-right-radius:4px;box-shadow:0 4px 0 var(--teal-dark);}
.c-msg.think{color:var(--sub);font-style:italic;background:#fff;align-self:flex-start;}
.chat-input-row{display:flex;gap:8px;padding:10px 0 4px;}
.chat-input{flex:1;border:3px solid #EADFC8;border-radius:999px;padding:12px 18px;font-size:1.05rem;
  font-family:"Nunito",sans-serif;font-weight:700;outline:none;}
.chat-input:focus{border-color:var(--teal);}
.chat-send{background:var(--teal);color:#fff;border:none;border-radius:999px;padding:0 24px;
  font-family:"Baloo 2",cursive;font-size:1.05rem;font-weight:800;cursor:pointer;box-shadow:0 4px 0 var(--teal-dark);}
.chat-mic{background:var(--coral);color:#fff;border:none;border-radius:50%;width:50px;height:50px;
  font-size:1.3rem;cursor:pointer;box-shadow:0 4px 0 #C74936;}
.chat-goal{font-size:0.85rem;font-weight:800;color:var(--sub);padding:4px 0;}

/* results */
.result-stars{font-size:4rem;letter-spacing:8px;margin:10px 0;}
.result-title{font-family:"Baloo 2",cursive;font-size:2rem;font-weight:800;color:var(--teal);}
.result-sub{font-weight:700;color:var(--sub);margin-top:6px;font-size:1.05rem;}
.confetti-piece{position:fixed;top:-30px;font-size:1.6rem;z-index:200;animation:fall linear forwards;pointer-events:none;}
@keyframes fall{to{transform:translateY(110vh) rotate(540deg);opacity:0.6;}}

@media (max-width:600px){
  .brand h1{font-size:1rem;}
  .pill{padding:5px 10px;font-size:0.8rem;}
  .opt-btn{width:120px;}
  .opt-btn.wide{width:100%;}
  .big-emoji{font-size:4.5rem;}
  .big-word{font-size:1.7rem;}
}
@media (prefers-reduced-motion: reduce){
  .node.current,.mascot,.repeat-banner{animation:none;}
}
</style>
</head>
<body>

<div class="topbar">
  <div class="brand">

</div>

/* ════════════════ PROGRESS (saved on this computer) ════════════════ */
function loadProgress(){
  try{ return JSON.parse(localStorage.getItem('glm_progress')||'{}'); }catch(e){ return {}; }
}
function saveProgress(p){ try{ localStorage.setItem('glm_progress',JSON.stringify(p)); }catch(e){} }
function totalStars(){
  var p=loadProgress(),t=0,k;
  for(k in p){ if(p[k] && p[k].stars) t+=p[k].stars; }
  return t;
}
function todayStr(){
  var d=new Date();
  return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
}
function yesterdayStr(){
  var y=new Date(); y.setDate(y.getDate()-1);
  return y.getFullYear()+'-'+String(y.getMonth()+1).padStart(2,'0')+'-'+String(y.getDate()).padStart(2,'0');
}
function bumpStreak(){
  var s;
  try{ s=JSON.parse(localStorage.getItem('glm_streak')||'{}'); }catch(e){ s={}; }
  var today=todayStr();
  if(s.last!==today){
    s.count = (s.last===yesterdayStr()) ? (s.count||0)+1 : 1;
    s.last=today;
    try{ localStorage.setItem('glm_streak',JSON.stringify(s)); }catch(e){}
  }
  return s.count||0;
}
function currentStreak(){
  var s;
  try{ s=JSON.parse(localStorage.getItem('glm_streak')||'{}'); }catch(e){ s={}; }
  if(!s.last) return 0;
  return (s.last===todayStr()||s.last===yesterdayStr()) ? (s.count||0) : 0;
}

  mode = (mode==='class') ? 'my' : 'class';

    mode='class';

/* ════════════════ SPEAKING (free browser voice) ════════════════ */
var pickedVoice=null;
function pickVoice(){
  var vs=window.speechSynthesis ? window.speechSynthesis.getVoices() : [];
  var i;
  for(i=0;i<vs.length;i++){ if(/en[-_]IN/i.test(vs[i].lang)){ pickedVoice=vs[i]; return; } }
  for(i=0;i<vs.length;i++){ if(/en[-_]GB/i.test(vs[i].lang)){ pickedVoice=vs[i]; return; } }
  for(i=0;i<vs.length;i++){ if(/^en/i.test(vs[i].lang)){ pickedVoice=vs[i]; return; } }
}
if(window.speechSynthesis){
  pickVoice();
  window.speechSynthesis.onvoiceschanged=pickVoice;
}
function say(text, cb){
  if(!window.speechSynthesis){ if(cb)cb(); return; }
  window.speechSynthesis.cancel();
  var u=new SpeechSynthesisUtterance(text);
  if(pickedVoice) u.voice=pickedVoice;
  u.rate=0.85; u.pitch=1.05;
  if(cb) u.onend=cb;
  window.speechSynthesis.speak(u);
}

/* ════════════════ UNLOCK RULES ════════════════ */
function stageComplete(si){
  var p=loadProgress();
  return STAGES[si].lessons.every(function(l){ return p[l.id] && p[l.id].stars>0; });
}
function stageUnlocked(si){
  if(si===0) return true;
  return stageComplete(si-1);
}
function lessonUnlocked(si, li){
  if(!stageUnlocked(si)) return false;
  if(li===0) return true;
  var prev=STAGES[si].lessons[li-1];
  var p=loadProgress();
  return !!(p[prev.id] && p[prev.id].stars>0);
}

/* ════════════════ PATH RENDERING ════════════════ */
function renderJourney(){
  var wrap=document.getElementById('journey');
  wrap.innerHTML='';
  var p=loadProgress();
  var mascotPlaced=false;

  STAGES.forEach(function(stage, si){
    var unlockedStage=stageUnlocked(si);
    var banner=document.createElement('div');
    banner.className='stage-banner'+(unlockedStage?'':' locked');
    var subText = unlockedStage ? stage.sub : ('Finish '+STAGES[si-1].name.split(' · ')[0]+' to open this');
    banner.innerHTML='<span class="st-emoji">'+stage.emoji+'</span>'+
      '<div><div class="st-name">'+stage.name+'</div><div class="st-sub">'+subText+'</div></div>';
    wrap.appendChild(banner);

    var block=document.createElement('div');
    block.className='path-block';

    var svg=document.createElementNS('http://www.w3.org/2000/svg','svg');
    svg.setAttribute('class','path-svg');
    var pathEl=document.createElementNS('http://www.w3.org/2000/svg','path');
    svg.appendChild(pathEl);
    block.appendChild(svg);

    var pts=[];
    stage.lessons.forEach(function(lesson, li){
      var row=document.createElement('div');
      row.className='node-row';
      var xPercent = 50 + 32*Math.sin(li*1.1);
      var node=document.createElement('button');
      var unlocked=lessonUnlocked(si,li);
      var done=!!(p[lesson.id] && p[lesson.id].stars>0);
      var cls='node';
      if(!unlocked) cls+=' locked';
      else if(done) cls+=' done';
      else cls+=' current';
      node.className=cls;
      node.style.position='absolute';
      node.style.left='calc('+xPercent+'% - 42px)';
      node.innerHTML=(unlocked?lesson.emoji:'🔒')+
        '<span class="node-label">'+lesson.label+'</span>'+
        (done?'<span class="stars">'+'⭐'.repeat(p[lesson.id].stars)+'</span>':'');
      if(unlocked){
        node.onclick=(function(s,l){return function(){openLesson(s,l);};})(si,li);
      }else{
        node.onclick=function(){ say('Finish the lesson before this one first!'); };
      }
      if(cls.indexOf('current')>=0 && !mascotPlaced){
        var m=document.createElement('span');
        m.className='mascot'; m.textContent='🦚';
        node.appendChild(m);
        mascotPlaced=true;
      }
      row.appendChild(node);
      block.appendChild(row);
      pts.push({x:xPercent, y:li*112+56});
    });

    wrap.appendChild(block);

    var w=block.clientWidth||520;
    var h=stage.lessons.length*112;
    svg.setAttribute('viewBox','0 0 '+w+' '+h);
    var d='';
    pts.forEach(function(pt,i){
      var px=pt.x/100*w, py=pt.y;
      if(i===0){ d+='M '+px+' '+py; }
      else{
        var prev=pts[i-1];
        var prx=prev.x/100*w, pry=prev.y;
        var midY=(pry+py)/2;
        d+=' C '+prx+' '+midY+', '+px+' '+midY+', '+px+' '+py;
      }
    });
    pathEl.setAttribute('d',d);
  });

  document.getElementById('star-count').textContent=totalStars();
  document.getElementById('streak-count').textContent=currentStreak();
}

/* ════════════════ SHARED LESSON STATE ════════════════ */
var L={stage:0,lesson:0,step:0,phase:'learn',score:0,quiz:[],chatCount:0,chatHistory:[]};

function stageType(){ return STAGES[L.stage].type; }
function curLesson(){ return STAGES[L.stage].lessons[L.lesson]; }

function openLesson(si,li){
  L={stage:si,lesson:li,step:0,phase:'learn',score:0,quiz:[],chatCount:0,chatHistory:[]};
  var t=STAGES[si].type;
  document.getElementById('lesson-modal').classList.add('open');
  if(t==='words'){ L.quiz=buildWordQuiz(si,li); showLearnStep(); }
  else if(t==='qa'){ L.quiz=buildQaQuiz(si,li); showQaLearnStep(); }
  else if(t==='dialog'){ L.quiz=buildDialogQuiz(si,li); showDialogLearnStep(); }
  else if(t==='chat'){ showChat(); }
}
function closeLesson(){
  if(window.speechSynthesis) window.speechSynthesis.cancel();
  document.getElementById('lesson-modal').classList.remove('open');
  renderJourney();
}
function learnTotal(){
  var t=stageType(), l=curLesson();
  if(t==='words') return l.words.length;
  if(t==='qa') return l.qa.length;
  if(t==='dialog') return l.lines.length;
  return 5;
}
function setProgressBar(){
  var total=learnTotal()+L.quiz.length;
  var doneSteps=(L.phase==='learn') ? L.step : learnTotal()+L.step;
  if(stageType()==='chat'){ total=5; doneSteps=Math.min(L.chatCount,5); }
  document.getElementById('prog-fill').style.width=Math.round(doneSteps/Math.max(total,1)*100)+'%';
}
function micOrRepeatHtml(){
  return (mode==='my' && SR)
    ? '<button class="say-btn" onclick="listenAndCheck()">🎤 Now you say it!</button><div class="say-feedback" id="say-fb"></div>'
    : '<div class="repeat-banner">🗣️ Everyone repeat together!</div>';
}

/* ════════════════ TYPE: WORDS / SENTENCES (Stages 1–2) ════════════════ */
function showLearnStep(){
  var words=curLesson().words;
  if(L.step>=words.length){ L.phase='quiz'; L.step=0; showQuizStep(); return; }
  setProgressBar();
  var wd=words[L.step];
  var body=document.getElementById('lesson-body');
  body.innerHTML=
    '<div class="big-card">'+
      '<div class="big-emoji">'+wd.e+'</div>'+
      '<div class="big-word">'+wd.w+'</div>'+
      (wd.s?'<div class="big-sentence">'+wd.s+'</div>':'')+
      '<button class="hear-btn" onclick="hearWord()">🔊 Hear it again</button><br/>'+
      micOrRepeatHtml()+
    '</div>'+
    '<button class="next-btn" onclick="nextLearnStep()">Next ➜</button>';
  say(wd.w+(wd.s?'. '+wd.s:''));
}
function hearWord(){
  var wd=curLesson().words[L.step];
  say(wd.w+(wd.s?'. '+wd.s:''));
}
function nextLearnStep(){ L.step++; showLearnStep(); }

function checkTarget(){
  /* what should the child say in the current learn step, per stage type */
  var t=stageType();
  if(t==='words') return curLesson().words[L.step].w;
  if(t==='qa') return curLesson().qa[L.step].a;
  if(t==='dialog') return curLesson().lines[L.step].text;
  return '';
}
function checkKey(){
  var t=stageType();
  if(t==='qa') return curLesson().qa[L.step].key;
  var target=checkTarget().toLowerCase().replace(/[^a-z ]/g,'');
  var parts=target.split(' ').filter(function(x){return x.length>2;});
  return parts.length? parts[parts.length-1] : target;
}
function listenAndCheck(){
  var fb=document.getElementById('say-fb');
  if(!SR){ if(fb)fb.textContent='Listening not available here.'; return; }
  var target=checkTarget(), key=checkKey().toLowerCase();
  fb.textContent='👂 Listening… say "'+target+'"';
  fb.style.color='var(--sub)';
  var rec=new SR();
  rec.lang='en-IN'; rec.interimResults=false; rec.maxAlternatives=3;
  var answered=false;
  rec.onresult=function(ev){
    answered=true;
    var heard='';
    try{ heard=ev.results[0][0].transcript.toLowerCase(); }catch(e){}
    if(heard.indexOf(key)>=0){
      fb.textContent='✅ Super! You said it!';
      fb.style.color='var(--leaf)';
      say('Super!');
    }else{
      fb.textContent='Almost! I heard "'+heard+'" — try once more!';
      fb.style.color='var(--coral)';
    }
  };
  rec.onerror=function(){ if(!answered){ fb.textContent='Could not hear. Check the microphone and try again.'; fb.style.color='var(--coral)'; } };
  rec.onend=function(){ if(!answered && fb.textContent.indexOf('Listening')>=0){ fb.textContent='Could not hear you. Try again!'; fb.style.color='var(--coral)'; } };
  try{ rec.start(); }catch(e){ fb.textContent='Microphone is busy. Try again.'; }
}

/* quiz for words/sentences: hear it, tap the right picture */
function shuffle(arr){
  for(var i=arr.length-1;i>0;i--){ var j=Math.floor(Math.random()*(i+1)); var t=arr[i];arr[i]=arr[j];arr[j]=t; }
  return arr;
}
function buildWordQuiz(si,li){
  var words=STAGES[si].lessons[li].words.slice();
  var qs=shuffle(words.map(function(w){ return {answer:w}; }));
  qs.forEach(function(q){
    var pool=shuffle(words.filter(function(w){ return w.w!==q.answer.w; }));
    q.options=shuffle([q.answer,pool[0],pool[1]]);
  });
  return qs;
}
function showQuizStep(){
  if(L.step>=L.quiz.length){ showResult(); return; }
  setProgressBar();
  var q=L.quiz[L.step];
  var wide = stageType()!=='words' || curLesson().words[0].w.indexOf(' ')>=0;
  var body=document.getElementById('lesson-body');
  var optsHtml=q.options.map(function(o,i){
    return '<button class="opt-btn'+(wide?' wide':'')+'" id="opt-'+i+'" onclick="pickOption('+i+')">'+
      '<div class="o-emoji">'+o.e+'</div><div class="o-word">'+o.w+'</div></button>';
  }).join('');
  body.innerHTML=
    '<div class="quiz-question">👂 Listen… then tap the right one!</div>'+
    '<button class="hear-btn" style="margin-bottom:22px;" onclick="sayQuizWord()">🔊 Hear it again</button>'+
    '<div class="quiz-options">'+optsHtml+'</div>';
  sayQuizWord();
}
function sayQuizWord(){ say(L.quiz[L.step].answer.w); }
function pickOption(i){
  var q=L.quiz[L.step];
  var chosen=q.options[i];
  var btn=document.getElementById('opt-'+i);
  var all=document.querySelectorAll('.opt-btn');
  for(var k=0;k<all.length;k++){ all[k].onclick=null; }
  if(chosen.w===q.answer.w){
    btn.classList.add('right'); L.score++; say('Correct!');
  }else{
    btn.classList.add('wrong');
    q.options.forEach(function(o,idx){
      if(o.w===q.answer.w) document.getElementById('opt-'+idx).classList.add('right');
    });
    say('The answer is '+q.answer.w);
  }
  setTimeout(function(){ L.step++; showQuizStep(); },1400);
}

/* ════════════════ TYPE: DIALOGUE (Stage 4) ════════════════ */
function dialogSoFarHtml(upto){
  var l=curLesson();
  var html='<div class="dialog-box">';
  for(var i=0;i<=upto && i<l.lines.length;i++){
    var line=l.lines[i];

    html+='<div class="d-line '+line.who.toLowerCase()+'"><div class="d-who">'+who+'</div>'+line.text+'</div>';
  }
  html+='</div>';
  return html;
}
function showDialogLearnStep(){
  var l=curLesson();
  if(L.step>=l.lines.length){ L.phase='quiz'; L.step=0; showDialogQuizStep(); return; }
  setProgressBar();
  var line=l.lines[L.step];

  if(line.who==='A'){
    body.innerHTML=
      dialogSoFarHtml(L.step)+
      '<button class="hear-btn" onclick="hearDialogLine()">🔊 Hear it again</button>'+
      '<button class="next-btn" onclick="nextDialogStep()">Next ➜</button>';

    body.innerHTML=
      dialogSoFarHtml(L.step-1)+
      '<div class="your-turn"><div class="yt-label">🫵 YOUR TURN — SAY:</div>'+
      '<div class="yt-line">'+line.text+'</div></div>'+

      micOrRepeatHtml()+

function hearDialogLine(){ say(curLesson().lines[L.step].text); }
function nextDialogStep(){ L.step++; showDialogLearnStep(); }

function buildDialogQuiz(si,li){
  var lesson=STAGES[si].lessons[li];
  var pairs=[];
  lesson.lines.forEach(function(line,i){
    if(line.who==='A' && lesson.lines[i+1] && lesson.lines[i+1].who==='B'){
      pairs.push({q:line.text, a:lesson.lines[i+1].text});
    }
  });
  /* wrong options come from B lines of other pairs */
  var allB=pairs.map(function(p){ return p.a; });
  var qs=shuffle(pairs.map(function(p){ return {answer:p}; }));
  qs.forEach(function(q){
    var pool=shuffle(allB.filter(function(b){ return b!==q.answer.a; }));
    var o1=pool[0]||'I do not know.';
    var o2=pool[1]||'Nothing, thank you.';
    q.options=shuffle([q.answer.a,o1,o2]);
  });
  return qs;
}
function showDialogQuizStep(){
  if(L.step>=L.quiz.length){ showResult(); return; }
  setProgressBar();
  var q=L.quiz[L.step];
  var l=curLesson();
  var body=document.getElementById('lesson-body');
  var optsHtml=q.options.map(function(o,i){
    return '<button class="opt-btn wide" id="opt-'+i+'" onclick="pickDialogOption('+i+')">'+
      '<div class="o-word">'+o+'</div></button>';
  }).join('');
  body.innerHTML=
    '<div class="quiz-question">'+l.whoA+' says:<br/>“'+q.answer.q+'”<br/>'+
    '<span style="font-size:0.95rem;color:var(--sub);">What do YOU say back?</span></div>'+
    '<button class="hear-btn" style="margin-bottom:22px;" onclick="sayDialogQ()">🔊 Hear it again</button>'+
    '<div class="quiz-options">'+optsHtml+'</div>';
  sayDialogQ();
}
function sayDialogQ(){ say(L.quiz[L.step].answer.q); }
function pickDialogOption(i){
  var q=L.quiz[L.step];
  var chosen=q.options[i];
  var btn=document.getElementById('opt-'+i);
  var all=document.querySelectorAll('.opt-btn');
  for(var k=0;k<all.length;k++){ all[k].onclick=null; }
  if(chosen===q.answer.a){
    btn.classList.add('right'); L.score++; say('Correct!');
  }else{
    btn.classList.add('wrong');
    q.options.forEach(function(o,idx){
      if(o===q.answer.a) document.getElementById('opt-'+idx).classList.add('right');
    });
    say('You say: '+q.answer.a);
  }
  setTimeout(function(){ L.step++; showDialogQuizStep(); },1500);
}

/* ════════════════ TYPE: FREE TALK WITH AI (Stage 5) ════════════════ */
var CHAT_GOAL=5;
function showChat(){
  var l=curLesson();
  L.chatHistory=[];
  L.chatCount=0;
  var body=document.getElementById('lesson-body');
  body.innerHTML=
    '<div class="chat-wrap">'+
      '<div class="chat-goal">🎯 Send '+CHAT_GOAL+' messages to earn your stars! (<span id="chat-done">0</span>/'+CHAT_GOAL+')</div>'+
      '<div class="chat-msgs" id="chat-msgs"></div>'+
      '<div class="chat-input-row">'+
        ((mode==='my'&&SR)?'<button class="chat-mic" onclick="chatMic()" title="Speak your message">🎤</button>':'')+
        '<input class="chat-input" id="chat-input" placeholder="Type in English… (simple words are fine!)" onkeydown="if(event.key===\'Enter\')sendChat()"/>'+
        '<button class="chat-send" onclick="sendChat()">Send</button>'+
      '</div>'+
    '</div>';
  setProgressBar();
  var opener='Hello! I am your English teacher. Today let us talk about '+l.label.toLowerCase()+'. '+chatOpenerQuestion(l.id);
  addChatMsg('ai',opener);
  say(opener);
}
function chatOpenerQuestion(id){
  if(id==='s5l1') return 'What did you do today?';
  if(id==='s5l2') return 'What is your favourite food?';
  if(id==='s5l3') return 'Let us make a story! Once upon a time, there was a little bird. What happened next?';
  return 'What do you want to talk about?';
}
function addChatMsg(who,text){
  var box=document.getElementById('chat-msgs');
  if(!box) return null;
  var d=document.createElement('div');
  d.className='c-msg '+who;
  d.textContent=text;
  box.appendChild(d);
  box.scrollTop=box.scrollHeight;
  return d;
}
function sendChat(){
  var inp=document.getElementById('chat-input');
  var text=(inp.value||'').trim();
  if(!text) return;
  inp.value='';
  addChatMsg('me',text);
  L.chatHistory.push({role:'user',content:text});
  L.chatCount++;
  var doneEl=document.getElementById('chat-done');
  if(doneEl) doneEl.textContent=Math.min(L.chatCount,CHAT_GOAL);
  setProgressBar();

  var thinking=addChatMsg('think','Teacher is thinking…');
  var l=curLesson();
  var systemPrompt='You are a warm, patient English teacher for young school children in Tamil Nadu, India. '+
    'The topic today is: '+l.topic+'. Rules: '+
    '1) Use very simple English — short sentences a 6 to 10 year old understands. '+
    '2) Reply in 1 to 3 short sentences only. '+
    '3) If the child makes a grammar mistake, gently show the correct way once, like: Good try! We say "I went to school." '+
    '4) Always end with one simple question to keep the child talking. '+
    '5) Be cheerful and encouraging. Never use difficult words. Never discuss anything unsuitable for children.';

  fetch('/api/ai',{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({payload:{
      model:'claude-sonnet-4-5',
      max_tokens:300,
      system:systemPrompt,
      messages:L.chatHistory.slice(-12)
    }})
  }).then(function(r){ return r.json(); })
  .then(function(data){
    if(thinking) thinking.remove();
    var reply='';
    if(data && data.content && data.content[0] && data.content[0].text){ reply=data.content[0].text; }
    else if(data && data.error){ reply='Sorry, I had a small problem. Let us try again — tell me once more!'; }
    else{ reply='Let us try again — tell me once more!'; }
    addChatMsg('ai',reply);
    L.chatHistory.push({role:'assistant',content:reply});
    say(reply);
    if(L.chatCount>=CHAT_GOAL){
      setTimeout(function(){ finishChat(); },2600);
    }
  }).catch(function(){
    if(thinking) thinking.remove();
    addChatMsg('ai','The internet hiccuped! Please send your message again.');
  });
}
function chatMic(){
  if(!SR) return;
  var inp=document.getElementById('chat-input');
  inp.placeholder='👂 Listening…';
  var rec=new SR();
  rec.lang='en-IN'; rec.interimResults=false;
  rec.onresult=function(ev){
    try{ inp.value=ev.results[0][0].transcript; }catch(e){}
    inp.placeholder='Type in English… (simple words are fine!)';
  };
  rec.onerror=function(){ inp.placeholder='Could not hear — type instead!'; };
  rec.onend=function(){ if(inp.placeholder.indexOf('Listening')>=0) inp.placeholder='Type in English… (simple words are fine!)'; };
  try{ rec.start(); }catch(e){}
}
function finishChat(){
  L.score=1; L.quiz=[{},{},{},{},{}]; /* so result math gives 3 stars via chat path */
  var lesson=curLesson();
  var p=loadProgress();
  var old=(p[lesson.id]&&p[lesson.id].stars)||0;
  if(3>old){ p[lesson.id]={stars:3}; saveProgress(p); }
  bumpStreak();
  confettiBurst();
  var body=document.getElementById('lesson-body');
  document.getElementById('prog-fill').style.width='100%';
  body.innerHTML=
    '<div class="result-title">🎉 Wonderful talking!</div>'+
    '<div class="result-stars">⭐⭐⭐</div>'+
    '<div class="result-sub">You spoke '+CHAT_GOAL+' times with your AI teacher. Real English practice!</div>'+
    '<button class="next-btn" onclick="closeLesson()">Back to my journey ➜</button>';
  say('Wonderful! You earned three stars for talking with me!');
}

/* ════════════════ RESULT (quiz stages) ════════════════ */
function showResult(){
  document.getElementById('prog-fill').style.width='100%';
  var total=L.quiz.length||1;
  var ratio=L.score/total;
  var stars = ratio>=0.99?3 : ratio>=0.75?2 : ratio>=0.5?1 : 0;
  var body=document.getElementById('lesson-body');
  var lesson=curLesson();

  if(stars>0){
    var p=loadProgress();
    var old=(p[lesson.id]&&p[lesson.id].stars)||0;
    if(stars>old){ p[lesson.id]={stars:stars}; saveProgress(p); }
    bumpStreak();
    confettiBurst();
    body.innerHTML=
      '<div class="result-title">🎉 Well done!</div>'+
      '<div class="result-stars">'+'⭐'.repeat(stars)+'<span style="opacity:0.25;">'+'⭐'.repeat(3-stars)+'</span></div>'+
      '<div class="result-sub">You got '+L.score+' out of '+total+' right!</div>'+
      '<button class="next-btn" onclick="closeLesson()">Back to my journey ➜</button>';
    say('Well done! You earned '+stars+(stars===1?' star!':' stars!'));
  }else{
    body.innerHTML=
      '<div class="result-title">💪 Good try!</div>'+
      '<div class="result-sub">You got '+L.score+' out of '+total+'. Let\u2019s learn once more!</div>'+
      '<button class="next-btn" onclick="retryLesson()">Try again ➜</button>'+
      '<br/><button class="hear-btn" style="margin-top:14px;" onclick="closeLesson()">Back to my journey</button>';
    say('Good try! Let us practice once more.');
  }
}
function retryLesson(){ openLesson(L.stage,L.lesson); }

function confettiBurst(){
  var emojis=['🎉','⭐','🎊','✨','🦚'];
  for(var i=0;i<24;i++){
    var el=document.createElement('div');
    el.className='confetti-piece';
    el.textContent=emojis[Math.floor(Math.random()*emojis.length)];
    el.style.left=Math.random()*100+'vw';
    el.style.animationDuration=(2+Math.random()*2)+'s';
    document.body.appendChild(el);
    setTimeout(function(node){ return function(){ node.remove(); }; }(el), 4500);
  }
}

/* ════════════════ START ════════════════ */
renderModeBtn();
renderJourney();
window.addEventListener('resize', renderJourney);
</script>
