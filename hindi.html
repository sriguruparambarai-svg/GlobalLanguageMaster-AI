<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Hindi Journey — Global Language Master</title>
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@600;700;800&family=Nunito:wght@600;700;800&display=swap" rel="stylesheet"/>
<style>
:root{--lotus:#E85D9A;--lotus-dark:#C13E77;--cream:#FFF9EF;--ink:#27323A;--sub:#5F7078;--mango:#FFB627;--mango-dark:#E89B00;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:"Nunito",sans-serif;background:var(--cream);min-height:100vh;
  display:flex;align-items:center;justify-content:center;padding:20px;color:var(--ink);}
.card{background:#fff;border-radius:26px;padding:44px 36px;max-width:440px;width:100%;
  text-align:center;box-shadow:0 10px 0 #EADFC8;}
.big{font-size:4.5rem;}
h1{font-family:"Baloo 2",cursive;font-size:1.7rem;font-weight:800;color:var(--lotus);margin-top:8px;}
p{font-weight:700;color:var(--sub);margin-top:10px;line-height:1.6;}
.back{display:inline-block;margin-top:24px;background:var(--mango);color:var(--ink);border-radius:999px;
  padding:13px 32px;font-family:"Baloo 2",cursive;font-size:1.1rem;font-weight:800;text-decoration:none;
  box-shadow:0 5px 0 var(--mango-dark);}
</style>
</head>
<body>
<div class="card">
  <div class="big">🪷</div>
  <h1>Hindi Journey — जल्द आ रहा है!</h1>
  <p>The Hindi Journey is being prepared with the same fun path, stars and games.<br/>It will open here very soon!</p>
  <a class="back" href="home.html">🏠 Back to Home</a>
</div>
<script>
'use strict';
var SCHOOL=null;
try{ SCHOOL=JSON.parse(localStorage.getItem('glm_school')||'null'); }catch(e){}
if(!SCHOOL || !SCHOOL.code){ location.href='index.html'; }
else if(!SCHOOL.has_hindi){ location.href='home.html'; }
</script>
</body>
</html>
